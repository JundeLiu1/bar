<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Florida Bar Essay 考点 — Flashcards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg1:#f1f8f4;--bg2:#e6f1ea;--ink:#16241d;--muted:#5d7468;--faint:#90a89a;
  --primary:#12a06a;--primary-d:#0a7d52;--primary-soft:#e1f4ea;
  --accent:#df8c27;--accent-soft:#fbeacd;
  --card:#fff;--line:#dde9e2;--line2:#eef5f1;
  --sh-sm:0 1px 2px rgba(16,80,50,.05),0 2px 7px rgba(16,80,50,.06);
  --sh-md:0 8px 26px rgba(16,90,55,.13);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);
  background:radial-gradient(1100px 460px at 82% -140px,#cfeede 0,transparent 60%),linear-gradient(180deg,var(--bg1),var(--bg2));
  background-attachment:fixed;font-size:17px;line-height:1.52;-webkit-font-smoothing:antialiased}
.serif{font-family:Fraunces,Georgia,serif}
.wrap{max-width:1140px;margin:0 auto;padding:0 22px}
.tabs{display:flex;flex-wrap:wrap;gap:9px;padding:20px 0 12px}
.tab{border:1px solid var(--line);background:#fff;color:var(--primary-d);padding:9px 15px;border-radius:13px;cursor:pointer;
  font-size:14.5px;font-weight:600;white-space:nowrap;box-shadow:var(--sh-sm);transition:transform .12s,box-shadow .12s}
.tab:hover{transform:translateY(-1px);box-shadow:var(--sh-md)}
.tab.active{background:linear-gradient(135deg,#15ab73,#0b8a5b);color:#fff;border-color:transparent}
.tab .n{opacity:.62;font-weight:600;margin-left:7px;font-size:12px}
.tab.active .n{opacity:.85}
.bar{position:sticky;top:0;z-index:30;margin-bottom:8px;backdrop-filter:blur(10px);
  background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh-sm);
  padding:12px 15px;display:flex;flex-wrap:wrap;gap:12px 18px;align-items:center}
.grp{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.grp .lbl{color:var(--faint);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.7px}
.seg{display:inline-flex;background:var(--line2);border-radius:11px;padding:3px}
.seg button{border:0;background:transparent;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--primary-d);font-weight:600;transition:.12s}
.seg button:hover{color:var(--primary)}
.seg button.on{background:#fff;color:var(--primary-d);box-shadow:var(--sh-sm)}
.btn{border:1px solid var(--line);background:#fff;color:var(--primary-d);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:600;box-shadow:var(--sh-sm);transition:.12s}
.btn:hover{transform:translateY(-1px);box-shadow:var(--sh-md)}
#search{border:1px solid var(--line);border-radius:10px;padding:8px 13px;font-size:14.5px;flex:1;min-width:170px;font-family:inherit;box-shadow:var(--sh-sm)}
#search:focus{outline:2px solid var(--primary-soft);border-color:var(--primary)}
main{max-width:1140px;margin:0 auto;padding:6px 22px 70px}
.sec{margin:26px 0 11px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.sec .eye{font-size:11px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:var(--primary-d);
  background:var(--primary-soft);padding:4px 10px;border-radius:7px}
.sec h2{margin:0;font-size:21px;font-weight:600;letter-spacing:-.2px}
.sec .cnt{color:var(--faint);font-size:14px;font-weight:600}
.sec .chev{margin-left:auto;color:var(--faint);transition:transform .15s}
.sec.collapsed .chev{transform:rotate(-90deg)}
.card{display:grid;grid-template-columns:32px minmax(190px,1fr) minmax(300px,1.55fr) 92px;gap:15px;align-items:stretch;
  background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 16px;margin-bottom:11px;
  box-shadow:var(--sh-sm);transition:box-shadow .14s,transform .14s,border-color .14s}
.card:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.card.hi{border-color:#eccf93;background:linear-gradient(0deg,#fffaf0,#fff)}
.num{color:var(--faint);font-size:13px;font-weight:700;padding-top:20px;text-align:center}
.panel{position:relative;border-radius:11px;min-height:66px;padding:9px 12px;display:flex;flex-direction:column;gap:5px}
.panel.rl{background:var(--line2)}
.panel .plabel{font-size:10.5px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;color:var(--faint)}
.panel.pt .plabel{color:#2f9d6c}
.panel .inner{font-size:16px}
.panel.pt .inner{font-weight:700;color:var(--ink);font-size:16.5px}
.panel.rl .inner{color:#2c4338;line-height:1.5}
.panel .cover{display:none}
.panel.hidden .inner{display:none}
.panel.hidden{cursor:pointer}
.panel.hidden .cover{display:flex;align-items:center;justify-content:center;gap:9px;flex:1;min-height:38px;
  border-radius:9px;border:1.5px dashed #b8ddca;background:linear-gradient(135deg,#eef8f2,#e2f2ea);
  color:#5fa886;font-size:14px;font-weight:700;letter-spacing:.2px;transition:.13s}
.panel.hidden:hover .cover{border-color:var(--primary);color:var(--primary-d);background:linear-gradient(135deg,#e6f6ee,#d8efe3)}
.panel .cover svg{width:17px;height:17px;opacity:.85}
.panel.reveal .inner{animation:rise .22s cubic-bezier(.2,.7,.3,1)}
@keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.freq{display:flex;flex-direction:column;gap:5px;align-items:flex-end;padding-top:5px}
.pill{font-size:11.5px;font-weight:800;padding:3px 10px;border-radius:999px;letter-spacing:.2px;white-space:nowrap}
.pill.all{background:#eef2f0;color:#54695e}
.pill.rec{background:var(--primary-soft);color:var(--primary-d)}
.pill.rec.hot{background:var(--accent-soft);color:#aa6515}
.pill.rec.zero{background:#f0f2f1;color:var(--faint)}
.empty{color:var(--muted);padding:54px;text-align:center;font-size:16px}
.foot{max-width:1140px;margin:0 auto;color:var(--faint);font-size:12.5px;padding:0 22px 44px;line-height:1.55}
@media(max-width:880px){
  /* subject tabs become a single-row horizontal-scroll nav bar (not a wrapped TOC) */
  .tabs{flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;gap:8px;padding:14px 4px 12px;
    scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 14px,#000 calc(100% - 18px),transparent);
            mask-image:linear-gradient(90deg,transparent,#000 14px,#000 calc(100% - 18px),transparent)}
  .tabs::-webkit-scrollbar{height:5px}
  .tabs::-webkit-scrollbar-thumb{background:#bcd6c7;border-radius:6px}
  .tab{flex:0 0 auto;scroll-snap-align:start}
  .card{grid-template-columns:26px 1fr 78px;grid-template-areas:'n pt f' 'n rl f';gap:11px}
  .num{grid-area:n;padding-top:4px}.panel.pt{grid-area:pt}.panel.rl{grid-area:rl}.freq{grid-area:f}
}
@media(max-width:560px){
  body{font-size:16px}
  .wrap,main,.foot{padding-left:13px;padding-right:13px}
  .card{grid-template-columns:1fr 66px;grid-template-areas:'pt f' 'rl f';padding:12px}
  .num{display:none}
  .sec h2{font-size:19px}
  .grp{gap:6px}
}
</style>
</head>
<body>
<div class="wrap"><div class="tabs" id="tabs"></div></div>
<div class="wrap"><div class="bar">
  <div class="grp"><span class="lbl">Quiz</span><div class="seg" id="mode">
    <button data-m="both">Hide both</button><button data-m="rule">Hide rule</button><button data-m="point">Hide point</button><button data-m="off">Show all</button>
  </div></div>
  <div class="grp"><span class="lbl">Min recent</span><div class="seg" id="minrec">
    <button data-r="0">All</button><button data-r="1">&ge;1</button><button data-r="3">&ge;3</button><button data-r="5">&ge;5</button>
  </div></div>
  <div class="grp"><span class="lbl">Sort</span><div class="seg" id="sort">
    <button data-s="flow">Flow</button><button data-s="freq">Freq</button>
  </div></div>
  <button class="btn" id="revealAll">Reveal all</button>
  <button class="btn" id="hideAll">Hide all</button>
  <input id="search" placeholder="Search points / rules…">
</div></div>
<main id="content"></main>
<div class="foot">Frequency = distinct exam administrations that tested the point. <b>all</b> 2003–2025 · <b>rec</b> 2016–2025 (amber = ≥4 recent). Amber-edged cards are high-yield (≥8 all-time). Rules are barebone, exam-portable statements.</div>
<script>
const P={"subjects": ["Contracts", "Torts", "Real Property", "Wills & Administration of Estates", "Family Law", "Criminal Law & Con. Crim. Pro.", "Florida Constitutional Law", "Federal/US Constitutional Law", "Professional Responsibility", "Evidence"], "data": {"Contracts": [{"section": "Governing Law", "point": "Governing law - UCC Article 2 vs. common law", "gist": "UCC Art. 2 governs sale of GOODS (movable things); common law governs services/land. Mixed contracts: PREDOMINANT-PURPOSE test controls.", "all": 16, "recent": 5}, {"section": "Governing Law", "point": "Merchant status / merchant rules", "gist": "A MERCHANT deals in goods of the kind or holds itself out as having special knowledge; special UCC rules (firm offer, confirmatory memo, 2-207) apply between/among merchants. Casual seller of own goods is NOT a merchant.", "all": 2, "recent": 1}, {"section": "Formation", "point": "Contract formation - elements / mutual assent", "gist": "Valid contract = OFFER + ACCEPTANCE (mutual assent to definite terms) + CONSIDERATION + no defenses.", "all": 14, "recent": 5}, {"section": "Formation", "point": "Offer / objective theory", "gist": "Offer = objective manifestation of present intent to be bound on DEFINITE terms, creating power of acceptance; tested by reasonable-offeree standard, secret intent irrelevant.", "all": 12, "recent": 4}, {"section": "Formation", "point": "Advertisement / price quote / bid as invitation, not offer", "gist": "Ads, FOR-SALE signs, price quotes, and bid solicitations are INVITATIONS to deal, not offers (unless clear, definite, leaving nothing open). A submitted bid is an offer; award is acceptance.", "all": 4, "recent": 0}, {"section": "Formation", "point": "Acceptance", "gist": "Acceptance = manifestation of assent to offer's terms; offeror is master of offer and controls manner; if unspecified, any reasonable means/conduct accepts within a reasonable time.", "all": 12, "recent": 4}, {"section": "Formation", "point": "Mirror-image rule / counteroffer / rejection", "gist": "Common law: acceptance must MIRROR the offer; any new/different term is a rejection + counteroffer that terminates the original offer; rejected offer cannot be revived; silence is not acceptance.", "all": 5, "recent": 1}, {"section": "Formation", "point": "UCC 2-207 battle of the forms", "gist": "UCC drops mirror image: definite acceptance with additional terms forms a contract; between merchants additional terms enter unless they materially alter, offer limits acceptance, or offeror objects; conflicting terms KNOCK OUT and are replaced by gap-fillers.", "all": 3, "recent": 2}, {"section": "Formation", "point": "Acceptance by shipment of goods", "gist": "UCC 2-206: order for prompt shipment may be accepted by promptly shipping; shipping NON-conforming goods is acceptance AND breach unless seasonably notified as an accommodation (then counteroffer).", "all": 1, "recent": 0}, {"section": "Formation", "point": "Mailbox rule", "gist": "Acceptance is effective on DISPATCH (when sent by authorized/reasonable means); revocation/rejection effective only on RECEIPT.", "all": 4, "recent": 0}, {"section": "Formation", "point": "Bilateral vs. unilateral contract", "gist": "Bilateral = promise for promise; unilateral = promise for performance, accepted only by completing performance; beginning performance makes a unilateral offer irrevocable.", "all": 1, "recent": 0}, {"section": "Formation", "point": "Consideration", "gist": "Consideration = BARGAINED-FOR exchange; FL recognizes legal BENEFIT to promisor OR legal DETRIMENT to promisee.", "all": 19, "recent": 7}, {"section": "Formation", "point": "Option contract / firm offer / revocation", "gist": "Offer freely revocable before acceptance (effective on receipt) UNLESS: common-law OPTION supported by separate consideration, or UCC FIRM OFFER (merchant's signed writing, irrevocable without consideration, max 3 months).", "all": 5, "recent": 0}, {"section": "Formation", "point": "Promissory estoppel / detrimental reliance", "gist": "A promise the promisor should reasonably expect to induce reliance, that DOES induce justifiable detrimental reliance, is enforceable to avoid injustice; remedy limited to reliance.", "all": 8, "recent": 3}, {"section": "Defenses to Formation & Enforcement", "point": "Capacity - minor / infancy", "gist": "A minor's contract is VOIDABLE at the minor's election only (not void, enforceable against the adult); disaffirm or ratify on reaching majority; necessaries exception.", "all": 4, "recent": 1}, {"section": "Defenses to Formation & Enforcement", "point": "Capacity - mental incapacity / intoxication", "gist": "A party lacking mental capacity to understand the transaction may avoid the contract.", "all": 1, "recent": 1}, {"section": "Defenses to Formation & Enforcement", "point": "Statute of Frauds - which contracts (MY LEGS) and writing/signature", "gist": "Writing signed by party to be charged required for: Marriage, contracts not performable within 1 Year, Land, Executor, Goods $500+, Suretyship; writing may be multiple documents; any authenticating mark/logo/letterhead = signature.", "all": 12, "recent": 4}, {"section": "Defenses to Formation & Enforcement", "point": "SOF - one-year provision", "gist": "Contract NOT capable of performance within one year must be written; if performance is POSSIBLE within a year (capability, not actuality), it is outside the SOF.", "all": 4, "recent": 2}, {"section": "Defenses to Formation & Enforcement", "point": "SOF - land / real property", "gist": "Land sale CONTRACT must be in writing and signed by the party to be charged, identifying the parties, price, and an adequate description of the land (Fla. Stat. 725.01); no witnesses are required. (The TWO-subscribing-witness rule, Fla. Stat. 689.01, applies to the DEED/conveyance, not the contract.)", "all": 4, "recent": 0}, {"section": "Defenses to Formation & Enforcement", "point": "SOF - part-performance / UCC exceptions", "gist": "UCC SOF satisfied to extent goods delivered/accepted/paid for; also specially manufactured goods, admission in pleadings, merchant confirmatory memo. Land: 2 of 3 (payment, possession, improvements).", "all": 7, "recent": 0}, {"section": "Defenses to Formation & Enforcement", "point": "SOF - merchant confirmatory memo", "gist": "Between merchants, a signed confirmation binds the non-signing merchant who fails to object in writing within 10 days.", "all": 1, "recent": 0}, {"section": "Defenses to Formation & Enforcement", "point": "Parol evidence rule / integration", "gist": "A fully integrated writing (merger clause) bars prior/contemporaneous terms that contradict it; admissible to interpret ambiguity, supplement a partial integration, show subsequent modification, condition precedent, or formation defect. UCC: more liberal supplementation.", "all": 7, "recent": 4}, {"section": "Defenses to Formation & Enforcement", "point": "Latent ambiguity / reformation for scrivener's error", "gist": "Latent ambiguity (not apparent on face) is clarified by extrinsic evidence of the parties' agreement; equity reforms a writing for scrivener's/mutual mistake to reflect the true agreement.", "all": 1, "recent": 1}, {"section": "Defenses to Formation & Enforcement", "point": "Defenses - fraud / misrepresentation", "gist": "Fraud = (1) misrepresentation/concealment of MATERIAL fact, (2) scienter, (3) intent to induce reliance, (4) JUSTIFIABLE reliance, (5) damages; renders contract VOIDABLE, allowing rescission. Fraud in the inducement is a personal defense.", "all": 9, "recent": 2}, {"section": "Defenses to Formation & Enforcement", "point": "Duty to disclose / nondisclosure", "gist": "Failure to disclose a material fact going to the essence of the deal can be an actionable misrepresentation where a duty to disclose exists.", "all": 0, "recent": 0}, {"section": "Defenses to Formation & Enforcement", "point": "Defenses - mutual mistake", "gist": "Voidable for mutual mistake on a BASIC, material assumption, UNLESS the party seeking avoidance bore the risk; mistake as to VALUE/price is not a defense.", "all": 5, "recent": 2}, {"section": "Defenses to Formation & Enforcement", "point": "Defenses - unilateral mistake", "gist": "Unilateral mistake borne by the mistaken party UNLESS the other party knew or should have known (snap-up), or enforcement would be unconscionable.", "all": 8, "recent": 2}, {"section": "Defenses to Formation & Enforcement", "point": "Defenses - duress / economic duress", "gist": "Voidable where an IMPROPER threat overcomes free will; threatening a lawful act (foreclosure) or mere financial distress is not duress.", "all": 2, "recent": 0}, {"section": "Defenses to Formation & Enforcement", "point": "Defenses - undue influence", "gist": "Confidential/fiduciary relationship plus a benefiting party who procured the transaction raises a presumption of undue influence, making the deal voidable.", "all": 1, "recent": 0}, {"section": "Defenses to Formation & Enforcement", "point": "Defenses - unconscionability", "gist": "Court may refuse to enforce a bargain so one-sided (procedural + substantive) that it shocks the conscience, judged at time of contracting.", "all": 3, "recent": 1}, {"section": "Defenses to Formation & Enforcement", "point": "Defenses - illegality / public policy", "gist": "A contract to do an illegal act is void as against public policy; legal conduct (e.g., playing the FL lottery) is not illegal.", "all": 1, "recent": 1}, {"section": "Defenses to Formation & Enforcement", "point": "Duty to read", "gist": "A party is bound by a signed contract he failed to read; failure to read is not a defense absent a hidden term he had no reason to know of.", "all": 2, "recent": 1}, {"section": "Terms, Modification & Warranties", "point": "Modification - common law vs. UCC", "gist": "Common law: modification needs NEW consideration (pre-existing duty rule); UCC 2-209: good-faith modification needs NO new consideration; if modified contract within SOF it must be written.", "all": 11, "recent": 2}, {"section": "Terms, Modification & Warranties", "point": "Warranties - express", "gist": "Any affirmation of fact, promise, description, model, or sample that becomes part of the BASIS OF THE BARGAIN creates an express warranty; mere opinion/puffery does not.", "all": 5, "recent": 0}, {"section": "Terms, Modification & Warranties", "point": "Warranties - implied warranty of merchantability", "gist": "A MERCHANT seller impliedly warrants goods are fit for their ordinary purpose; disclaimable by conspicuous 'as is'; FL extends to buyer's family/household guests.", "all": 4, "recent": 0}, {"section": "Terms, Modification & Warranties", "point": "Warranties - implied warranty of fitness for particular purpose", "gist": "Where seller knows buyer's particular purpose and buyer relies on seller's skill to select, goods are warranted fit for that purpose.", "all": 4, "recent": 0}, {"section": "Terms, Modification & Warranties", "point": "Warranty disclaimers", "gist": "Disclaimers must be conspicuous; 'as is' disclaims implied warranties but cannot negate an EXPRESS warranty; a disclaimer contradicting an express warranty is inoperative.", "all": 1, "recent": 0}, {"section": "Terms, Modification & Warranties", "point": "UCC - quantity / output-requirements / gap fillers", "gist": "UCC: only essential term is QUANTITY; other open terms filled by gap-fillers, course of dealing, usage of trade, course of performance. Output/requirements contracts enforceable, measured in good faith.", "all": 3, "recent": 1}, {"section": "Performance, Breach & Excuse", "point": "Conditions precedent / satisfaction clauses", "gist": "Duty to perform does not arise until an express CONDITION PRECEDENT is satisfied; strict compliance required; satisfaction measured by reasonable person (or good-faith taste).", "all": 3, "recent": 2}, {"section": "Performance, Breach & Excuse", "point": "Performance - material vs. minor breach / substantial performance", "gist": "Common law: only a MATERIAL breach (denial of substantial benefit of the bargain) excuses the other party's performance; substantial performance with immaterial deviations entitles the performer to the price less damages.", "all": 6, "recent": 3}, {"section": "Performance, Breach & Excuse", "point": "Breach of contract", "gist": "Breach = failure to perform an absolute duty when due; non-breaching party must prove valid contract, breach, and damages.", "all": 5, "recent": 2}, {"section": "Performance, Breach & Excuse", "point": "UCC perfect tender rule", "gist": "UCC single-delivery: buyer may REJECT if goods fail to conform in ANY respect; accept all, reject all, or accept commercial units; acceptance waives the right to reject.", "all": 4, "recent": 0}, {"section": "Performance, Breach & Excuse", "point": "UCC installment contracts", "gist": "Installment contract: buyer may reject an installment only if the nonconformity SUBSTANTIALLY impairs that installment; breaches the whole only if it substantially impairs the whole contract.", "all": 1, "recent": 0}, {"section": "Performance, Breach & Excuse", "point": "UCC right to cure", "gist": "Seller who delivers nonconforming goods may CURE within the contract time (or by conforming later installments).", "all": 1, "recent": 0}, {"section": "Performance, Breach & Excuse", "point": "UCC revocation of acceptance", "gist": "After acceptance, buyer may revoke only if the nonconformity SUBSTANTIALLY impairs value and acceptance was reasonably justified.", "all": 1, "recent": 0}, {"section": "Performance, Breach & Excuse", "point": "UCC risk of loss / time for delivery", "gist": "Merchant seller, no carrier: risk of loss passes on buyer's ACTUAL receipt/physical possession. If time not of the essence, seller has a reasonable time to deliver.", "all": 2, "recent": 1}, {"section": "Performance, Breach & Excuse", "point": "Divisible / entire contract", "gist": "A contract is DIVISIBLE only if performances are apportioned into agreed equivalent pairs; a single lump price makes it entire.", "all": 2, "recent": 0}, {"section": "Performance, Breach & Excuse", "point": "Anticipatory repudiation", "gist": "A CLEAR, UNEQUIVOCAL statement before performance is due that a party will not perform lets the non-breacher sue now, suspend/await performance, or treat as total breach; a mere request is not unequivocal; retractable before reliance.", "all": 7, "recent": 2}, {"section": "Performance, Breach & Excuse", "point": "Demand for adequate assurances", "gist": "UCC 2-609: party with REASONABLE GROUNDS for insecurity may demand adequate written assurances and suspend performance; failure to respond within a reasonable time (max 30 days) is repudiation.", "all": 3, "recent": 1}, {"section": "Performance, Breach & Excuse", "point": "Excuse - impossibility / impracticability", "gist": "Performance excused where an UNFORESEEN supervening event makes it objectively impossible/impracticable; foreseeable events (e.g., market/price increases) do NOT excuse.", "all": 6, "recent": 1}, {"section": "Performance, Breach & Excuse", "point": "Excuse - frustration of purpose", "gist": "Excused where an unforeseen event destroys the PRINCIPAL PURPOSE known to both parties; unavailable if the basic purpose can still be achieved.", "all": 1, "recent": 1}, {"section": "Performance, Breach & Excuse", "point": "Discharge - accord and satisfaction", "gist": "Cashing a check tendered as full satisfaction of a genuinely DISPUTED debt discharges it; absent a 'paid in full' notation or honest dispute, cashing does not bar the balance.", "all": 1, "recent": 1}, {"section": "Third Parties", "point": "Third-party beneficiaries", "gist": "An INTENDED beneficiary may enforce the contract once rights vest (learns of + assents, sues, or detrimentally relies); takes subject to defenses; no privity = no contract claim by a stranger.", "all": 3, "recent": 2}, {"section": "Third Parties", "point": "Assignment of rights / delegation of duties", "gist": "Contract rights are freely ASSIGNABLE unless prohibited; assignee takes subject to all defenses against the assignor; duties delegable unless personal or materially varying obligee's risk.", "all": 2, "recent": 1}, {"section": "Third Parties", "point": "Covenant not to compete (FL)", "gist": "FL Stat. 542.335: enforceable if it protects a LEGITIMATE BUSINESS INTEREST and is reasonable in time/geography/scope; <6 mo presumed reasonable, >2 yrs (employee) presumed unreasonable; court may BLUE-PENCIL/reform overbroad terms.", "all": 3, "recent": 3}, {"section": "Third Parties", "point": "Exculpatory / release clauses", "gist": "A release is a common-law contract; exculpatory clauses must clearly disclose the inherent danger; clauses waiving liability for intentional torts or all negligence are void against public policy.", "all": 1, "recent": 1}, {"section": "Remedies", "point": "Remedies - expectation damages", "gist": "Default remedy: EXPECTATION damages put non-breacher in position of full performance; must be actual, reasonable, FORESEEABLE, certain, and unavoidable.", "all": 12, "recent": 5}, {"section": "Remedies", "point": "Remedies - buyer's UCC damages (market / cover)", "gist": "Buyer may COVER in good faith and recover cover price minus contract price, OR market price minus contract price, plus incidental/consequential, less expenses saved.", "all": 4, "recent": 1}, {"section": "Remedies", "point": "Remedies - seller's UCC damages / lost-volume seller", "gist": "On buyer's breach seller recovers contract price minus resale/market price plus incidentals; a LOST-VOLUME seller recovers lost profit (price minus cost).", "all": 3, "recent": 0}, {"section": "Remedies", "point": "Remedies - incidental & consequential damages (Hadley)", "gist": "Incidental = costs incident to breach; CONSEQUENTIAL (lost profits) recoverable only if FORESEEABLE/known to breaching party at contracting and proven with reasonable certainty (Hadley v. Baxendale).", "all": 5, "recent": 3}, {"section": "Remedies", "point": "Remedies - reliance damages", "gist": "Reliance damages restore the non-breacher to its PRE-CONTRACT position; alternative when expectation is uncertain.", "all": 2, "recent": 1}, {"section": "Remedies", "point": "Remedies - duty to mitigate", "gist": "Non-breaching party must take REASONABLE steps to mitigate (cover/resell/seek comparable employment); cannot recover avoidable losses, but a reasonable cover price is recoverable.", "all": 4, "recent": 2}, {"section": "Remedies", "point": "Remedies - liquidated damages clause", "gist": "Enforceable only if (1) actual damages were difficult to estimate at contracting and (2) the amount is a REASONABLE forecast, not a PENALTY; FL will not enforce a penalty.", "all": 5, "recent": 3}, {"section": "Remedies", "point": "Remedies - specific performance", "gist": "Equitable; available only where legal remedy is INADEQUATE and subject matter is UNIQUE (land always unique; unique goods); cut off by sale to a BFP; not for personal-services contracts.", "all": 13, "recent": 4}, {"section": "Remedies", "point": "Remedies - rescission", "gist": "Equitable; unwinds the contract and restores parties to pre-contract position; available for material mistake, misrepresentation/fraud, or material breach.", "all": 3, "recent": 0}, {"section": "Remedies", "point": "Remedies - restitution / quasi-contract / unjust enrichment", "gist": "Even absent an enforceable contract, recovery of the VALUE of benefits conferred to prevent unjust enrichment; unavailable where an adequate legal remedy (a contract) exists.", "all": 5, "recent": 3}, {"section": "Remedies", "point": "Remedies - punitive damages unavailable", "gist": "Punitive damages are NOT recoverable for breach of contract absent an independent tort.", "all": 2, "recent": 0}, {"section": "Remedies", "point": "Remedies - attorney's fees (American Rule + FL statutes)", "gist": "Each party bears own fees absent statute/contract; a prevailing-party fee clause is enforceable; FL Stat. 57.105(7) makes a one-sided fee clause RECIPROCAL.", "all": 4, "recent": 1}, {"section": "Remedies", "point": "Contract terms / permissible provisions", "gist": "Parties may include 'as is,' deposit, inspection-period, and liquidated-damages provisions in a real-property contract.", "all": 1, "recent": 0}, {"section": "Remedies", "point": "Land-sale contract damages measure", "gist": "Damages for breach of a land-sale contract = difference between FAIR MARKET VALUE and contract price (plus return of deposit), or expectation/restitution.", "all": 4, "recent": 0}, {"section": "UCC Article 2 Recap", "point": "UCC Article 2 applicability / goods & merchants", "gist": "UCC Art. 2 governs contracts for the sale of goods (movable items); special merchant rules apply when both parties are merchants.", "all": 1, "recent": 0}, {"section": "UCC Article 2 Recap", "point": "Statute of Frauds (UCC $500)", "gist": "Sale of goods $500+ must be in a signed writing stating quantity; merchant's confirmatory memo exception binds a merchant who fails to object within 10 days.", "all": 1, "recent": 0}], "Torts": [{"section": "Negligence (Duty, Breach, Causation)", "point": "Negligence - prima facie case", "gist": "Negligence = (1) duty, (2) breach, (3) actual cause (but-for), (4) proximate (foreseeable) cause, (5) damages; proven by preponderance.", "all": 17, "recent": 7}, {"section": "Negligence (Duty, Breach, Causation)", "point": "Standard of care", "gist": "Objective reasonably-prudent-person standard owed to all foreseeable plaintiffs; adults held to it (voluntary intoxication no defense); child held to reasonable child of like age/intelligence/experience unless engaged in adult activity (driving = adult standard).", "all": 4, "recent": 2}, {"section": "Negligence (Duty, Breach, Causation)", "point": "Negligence per se", "gist": "Violation of a statute is negligence per se where plaintiff is in the protected class and the harm is the type the statute aimed to prevent; FL: penal statute = neg per se, non-penal statute = only prima facie evidence of negligence.", "all": 6, "recent": 2}, {"section": "Negligence (Duty, Breach, Causation)", "point": "Premises liability", "gist": "Invitee owed duty to inspect, warn, and make safe non-obvious dangers; licensee owed duty to warn of known concealed dangers; trespasser owed only no willful/wanton harm (known/anticipated trespasser owed warning of hidden artificial dangers). No duty for open and obvious hazards.", "all": 8, "recent": 4}, {"section": "Negligence (Duty, Breach, Causation)", "point": "Premises liability", "gist": "FL business owner liable for a transitory foreign substance only with actual or constructive notice (condition existed long enough that reasonable inspection would have discovered it).", "all": 2, "recent": 2}, {"section": "Negligence (Duty, Breach, Causation)", "point": "Landowner duties - special doctrines", "gist": "Attractive nuisance: possessor liable to child trespassers lured by artificial condition. Landowner's duty to keep premises safe is non-delegable. Slavin: contractor relieved after owner accepts work except for latent (not patent) defects. Landowner may owe duty to aid one injured by a condition once aware of peril.", "all": 2, "recent": 1}, {"section": "Negligence (Duty, Breach, Causation)", "point": "Causation", "gist": "Actual cause = but-for (substantial factor where multiple sufficient causes); proximate cause limits liability to foreseeable results within the zone of risk (Cardozo foreseeable-plaintiff vs. Andrews any-injured-person).", "all": 10, "recent": 5}, {"section": "Negligence (Duty, Breach, Causation)", "point": "Causation", "gist": "A foreseeable intervening cause (rescue, negligent medical treatment, aggravation in transport) does not break the chain; only an unforeseeable superseding cause (act of God, intentional crime) cuts off liability.", "all": 9, "recent": 3}, {"section": "Negligence (Duty, Breach, Causation)", "point": "Eggshell plaintiff rule", "gist": "Defendant takes the plaintiff as found and is liable for the full extent of harm even if unforeseeably severe; need only foresee that some harm was foreseeable.", "all": 5, "recent": 4}, {"section": "Negligence (Duty, Breach, Causation)", "point": "Original tortfeasor liability / rescue doctrine", "gist": "Original tortfeasor liable for foreseeable aggravation including injury from a rescuer and subsequent negligent medical treatment; danger invites rescue, so original tortfeasor liable to a foreseeable rescuer (rescuer liable for own negligence).", "all": 1, "recent": 0}, {"section": "Negligence (Duty, Breach, Causation)", "point": "Duty to rescue / voluntary undertaking / Good Samaritan", "gist": "No general duty to rescue absent a special relationship; a volunteer who undertakes a rescue must act with reasonable care. FL's Good Samaritan Act (Fla. Stat. 768.13) immunizes gratuitous emergency care, and immunizes hospital/ER/trauma providers of emergency medical care unless they acted with RECKLESS DISREGARD for the patient's life or health.", "all": 3, "recent": 0}, {"section": "Negligence (Duty, Breach, Causation)", "point": "Medical malpractice", "gist": "Physician must exercise care, skill and treatment of a reasonably prudent similar provider, proven by expert testimony; FL med-mal requires presuit investigation with corroborating expert affidavit and 90-day presuit notice tolling SOL; voluntary binding arbitration with statutory noneconomic caps.", "all": 2, "recent": 0}, {"section": "Vicarious & Multi-Party Liability", "point": "Vicarious liability / respondeat superior", "gist": "Employer liable for employee torts within scope of employment; intentional torts generally outside scope unless to further employer's business; a minor detour stays within scope but a frolic (substantial deviation) does not.", "all": 14, "recent": 5}, {"section": "Vicarious & Multi-Party Liability", "point": "Negligent hiring / retention / supervision / training", "gist": "Employer directly liable where it knew or should have known of an employee's unfitness (reasonable background check would reveal propensity) and that unfitness caused the harm; distinct from vicarious liability.", "all": 4, "recent": 1}, {"section": "Vicarious & Multi-Party Liability", "point": "Negligent / parental supervision; parent-child immunity", "gist": "Parents not vicariously liable for a child's torts but liable for own negligence where they knew/should have known of the child's dangerous propensity and failed to control; FL waives parent-child immunity only up to the limits of the parent's liability insurance.", "all": 2, "recent": 0}, {"section": "Vicarious & Multi-Party Liability", "point": "Dangerous instrumentality doctrine", "gist": "In FL a vehicle (incl. golf cart) is a dangerous instrumentality; the owner who permits use is vicariously liable for the operator's negligence even beyond scope of permission (statutory caps for permissive non-owner use). Negligent entrustment / keys-in-vehicle to a third party is weak/remote.", "all": 2, "recent": 0}, {"section": "Vicarious & Multi-Party Liability", "point": "Independent contractor / non-delegable duty", "gist": "A hirer is not vicariously liable for an independent contractor's torts unless the activity is inherently or abnormally dangerous, or the duty is non-delegable.", "all": 1, "recent": 1}, {"section": "Special Negligence Claims", "point": "NIED", "gist": "FL impact rule requires physical impact or physical manifestation of symptoms; bystander recovery requires close relationship, presence at scene, contemporaneous perception, plus a discernible physical injury/manifestation.", "all": 4, "recent": 1}, {"section": "Special Negligence Claims", "point": "Special negligence claims (security, dram shop, rear-end, impairment of collateral)", "gist": "Negligent security requires foreseeability of criminal acts; FL dram-shop (768.125) limits tavern liability except serving a minor or known habitual drunkard; FL rebuttable presumption of negligence against rear driver; negligent impairment of security interest where security holder is a foreseeable plaintiff.", "all": 5, "recent": 1}, {"section": "Defenses, Immunities & Apportionment", "point": "Pure comparative negligence (FL) / modified post-2023", "gist": "FL was pure comparative negligence (plaintiff recovers reduced by his % fault even if 99% at fault); post-2023 FL adopted MODIFIED comparative negligence barring a plaintiff more than 50% at fault.", "all": 18, "recent": 7}, {"section": "Defenses, Immunities & Apportionment", "point": "Comparative-fault defenses (seat belt, assumption of risk, open and obvious)", "gist": "FL: failure to use an available operable seat belt reduces (does not bar) recovery; FL recognizes only EXPRESS (not implied) assumption of risk - implied AoR is abolished/subsumed into comparative fault; express release must show knowing, voluntary acceptance of the risk.", "all": 6, "recent": 2}, {"section": "Defenses, Immunities & Apportionment", "point": "Abolition of joint and several liability / Fabre apportionment", "gist": "FL has abolished joint and several liability; each defendant pays only its own percentage of fault, and fault may be apportioned to a nonparty (Fabre defendant) whose share reduces plaintiff's recovery.", "all": 12, "recent": 5}, {"section": "Defenses, Immunities & Apportionment", "point": "Sovereign immunity (FL / FTCA)", "gist": "FL waives sovereign immunity for operational/ministerial acts but retains it for discretionary planning-level decisions; capped at $200k per person / $300k per occurrence (excess needs a legislative claim bill). FTCA waives federal immunity for negligence but retains it for certain intentional torts (false imprisonment, defamation).", "all": 3, "recent": 1}, {"section": "Strict Liability & Products", "point": "Strict products liability", "gist": "A commercial seller in the chain of distribution is strictly liable for an unreasonably dangerous defect existing when it left defendant's control that causes injury in foreseeable use; FL abolished privity, so all foreseeable users/bystanders may sue.", "all": 5, "recent": 1}, {"section": "Strict Liability & Products", "point": "Strict products liability", "gist": "Manufacturing defect = unit departs from intended design; design defect = unreasonably dangerous where a reasonable alternative design would reduce risk (risk-utility); failure to warn = inadequate warnings of non-obvious dangers.", "all": 4, "recent": 1}, {"section": "Strict Liability & Products", "point": "Strict products liability", "gist": "Defendant escapes liability if product was substantially altered/modified after leaving its control in an unforeseeable way; plaintiff must make a foreseeable use (misuse may still be foreseeable - jury question); govt-standard compliance is evidence (not conclusive) of non-defectiveness; innocent seller not liable for hidden defect on a negligence theory.", "all": 4, "recent": 0}, {"section": "Strict Liability & Products", "point": "Products - implied warranty of merchantability", "gist": "Implied warranty of merchantability sounds in contract and generally requires privity (buyer and immediate household/guests).", "all": 1, "recent": 1}, {"section": "Strict Liability & Products", "point": "Indemnification / contribution", "gist": "A vicariously or strictly liable party (employer, non-negligent retailer/distributor) who pays may seek full indemnification from the actively negligent/manufacturing party; non-altering distributor may seek contribution/indemnity per the distribution agreement.", "all": 4, "recent": 0}, {"section": "Strict Liability & Products", "point": "Strict liability - dog bite / animals", "gist": "FL dog-bite statute imposes strict liability on the owner regardless of the dog's prior viciousness or owner's knowledge (no 'one free bite'); reduced by the victim's own comparative negligence/provocation.", "all": 2, "recent": 1}, {"section": "Intentional Torts & Defenses", "point": "Battery", "gist": "Intentional harmful or offensive contact with plaintiff's person (or something connected to it) without consent; intent to do the act suffices (intent to harm not required; substantial certainty/transferred intent); intoxication is no defense.", "all": 8, "recent": 2}, {"section": "Intentional Torts & Defenses", "point": "Assault", "gist": "Intentional act causing plaintiff's reasonable apprehension of imminent harmful or offensive contact.", "all": 3, "recent": 1}, {"section": "Intentional Torts & Defenses", "point": "False imprisonment", "gist": "Intentional confinement to a bounded area against plaintiff's will (by force/threat) of which plaintiff is aware/harmed; FL merchant may detain a suspected shoplifter on reasonable suspicion, in a reasonable manner, for a reasonable time.", "all": 1, "recent": 0}, {"section": "Intentional Torts & Defenses", "point": "IIED", "gist": "Extreme and outrageous conduct (exceeding bounds tolerated by a decent society), intent or recklessness, causation, and severe emotional distress; mere insults insufficient; in FL physical manifestation often required.", "all": 8, "recent": 2}, {"section": "Intentional Torts & Defenses", "point": "Trespass to land", "gist": "Intentional physical entry/invasion of land another lawfully possesses (by person or object); intent to enter suffices (mistake of boundary no excuse); nominal damages available absent harm.", "all": 3, "recent": 1}, {"section": "Intentional Torts & Defenses", "point": "Necessity (defense to trespass)", "gist": "Private necessity privileges entry onto another's land to protect life (e.g., to summon aid for an injured person), justifying the trespass.", "all": 1, "recent": 0}, {"section": "Intentional Torts & Defenses", "point": "Conversion / civil theft", "gist": "Intentional exercise of dominion over another's chattel so serious as to require payment of full value; FL civil theft permits treble damages; reasonable belief of ownership may negate intent.", "all": 2, "recent": 0}, {"section": "Intentional Torts & Defenses", "point": "Defenses to intentional torts (self-defense, defense of property, consent)", "gist": "Self-defense requires not being the initial aggressor (words alone do not justify force; aggressor must withdraw to regain privilege); defense of property allows only reasonable, proportional, non-deadly force; consent/implied AoR is a defense but does not cover injury beyond its scope.", "all": 2, "recent": 0}, {"section": "Defamation & Privacy", "point": "Defamation", "gist": "FL defamation = (1) false defamatory statement of fact of and concerning an identifiable plaintiff, (2) published to a third party, (3) fault, (4) damage to reputation; pure opinion not actionable.", "all": 8, "recent": 4}, {"section": "Defamation & Privacy", "point": "Defamation", "gist": "Libel (written/permanent) presumes general damages; slander (spoken) requires special damages unless slander per se (crime of moral turpitude, loathsome disease, business/profession, unchastity); FL media/print defamation requires proof of ACTUAL damages (not presumed).", "all": 6, "recent": 3}, {"section": "Defamation & Privacy", "point": "Defamation", "gist": "Public figure/official on a matter of public concern must prove falsity + actual malice (knowledge of falsity or reckless disregard); private plaintiff need only prove negligence; limited-purpose public figure only as to that controversy.", "all": 6, "recent": 4}, {"section": "Defamation & Privacy", "point": "Defamation", "gist": "Truth is an absolute defense; pure opinion (reasonable reader would not take as fact) not actionable; qualified privilege for good-faith reports to one with a legitimate interest (police, supervisor, fair report of official record), lost if exceeded or made with malice/ill will.", "all": 7, "recent": 4}, {"section": "Defamation & Privacy", "point": "Defamation", "gist": "Before suing a media defendant for libel, plaintiff must serve pre-suit written notice and give 5 days to retract; failure to serve forfeits the action; a good-faith timely retraction limits recovery to actual damages and negates the malice presumption.", "all": 5, "recent": 3}, {"section": "Defamation & Privacy", "point": "Invasion of privacy", "gist": "Branches: appropriation of name/likeness for commercial advantage, public disclosure of private non-newsworthy facts, intrusion upon seclusion, and false light; FL recognizes the first three but NOT false light; newsworthiness/public-concern defeats disclosure claims.", "all": 3, "recent": 1}, {"section": "Economic & Dignitary Torts", "point": "Misrepresentation (fraudulent / negligent)", "gist": "Misrepresentation of a material fact + scienter (knowing falsity) + intent to induce reliance + justifiable reliance + causation + damages; honest belief negates scienter; mere silence usually not a false statement.", "all": 6, "recent": 0}, {"section": "Economic & Dignitary Torts", "point": "Tortious interference with contract", "gist": "(1) valid existing contract, (2) defendant's knowledge of it, (3) intentional interference inducing breach, (4) resulting damages.", "all": 1, "recent": 1}, {"section": "Economic & Dignitary Torts", "point": "Malicious prosecution", "gist": "Instituting/causing a criminal proceeding without probable cause, with malice, that terminates in plaintiff's favor, causing damages; good-faith belief defeats malice.", "all": 1, "recent": 0}, {"section": "Damages & FL Damage Doctrines", "point": "Wrongful death and survival action (FL)", "gist": "Survival action (s.46.021) continues decedent's own pre-death claims (medical expenses, lost wages, pre-death pain & suffering) for the estate; FL Wrongful Death Act (s.768.19) is a new claim by the PR for survivors' losses (loss of support/consortium/companionship, net accumulations, funeral expenses).", "all": 4, "recent": 0}, {"section": "Damages & FL Damage Doctrines", "point": "Compensatory damages", "gist": "Plaintiff recovers economic (past/future medical, lost wages/earning capacity) and non-economic (pain and suffering, disfigurement) damages; spouse may recover loss of consortium; future damages reduced to present value; speculative/remote damages not recoverable; negligence requires physical harm (pure economic loss insufficient).", "all": 10, "recent": 6}, {"section": "Damages & FL Damage Doctrines", "point": "Collateral source rule (FL)", "gist": "Unlike the common-law rule, FL reduces recovery by certain collateral-source benefits (e.g., insurance), subject to subrogation rights.", "all": 2, "recent": 2}, {"section": "Damages & FL Damage Doctrines", "point": "Punitive damages - standard and FL caps", "gist": "FL punitives require clear and convincing evidence of intentional misconduct or gross negligence, pleaded specifically; capped at the greater of 3x compensatory or $500,000 (4x or $2M if financial-gain motive); no cap for intentional harm or intoxication; not available on contract claims.", "all": 14, "recent": 3}, {"section": "Damages & FL Damage Doctrines", "point": "Procedural - joinder / SOL", "gist": "Permissive joinder where claims arise from the same transaction/occurrence with common questions; FL tort actions (incl. wrongful death) generally must be filed within 2 years.", "all": 1, "recent": 0}, {"section": "Damages & FL Damage Doctrines", "point": "Damages and apportionment (FL)", "gist": "Plaintiff recovers economic and non-economic damages; FL apportions damages among defendants by percentage of fault (no joint and several liability).", "all": 1, "recent": 0}, {"section": "Damages & FL Damage Doctrines", "point": "Comparative negligence / seatbelt defense", "gist": "FL modified comparative negligence bars a plaintiff over 50% at fault; failure to wear a seatbelt reduces recovery by the plaintiff's percentage of fault.", "all": 1, "recent": 1}], "Real Property": [{"section": "Land Contracts & Closing", "point": "Statute of Frauds / land contract formation", "gist": "Land sale/lease >1 yr must be in writing, signed by party charged, naming parties, describing land (reasonable certainty; latent ambiguity curable by extrinsic evidence), and stating price; valid K needs offer/acceptance/consideration.", "all": 8, "recent": 2}, {"section": "Land Contracts & Closing", "point": "FL deed/conveyance formality - two subscribing witnesses", "gist": "FL Stat. 689.01: a conveyance of a land interest (deed) must be signed by grantor before TWO subscribing witnesses; absence voids the deed (but not an SOF-enforceable contract signed by party charged).", "all": 1, "recent": 0}, {"section": "Land Contracts & Closing", "point": "SOF exception - part performance", "gist": "Part performance removes a land K from the SOF where buyer does two of three: pays all/substantially all price, takes possession, makes improvements (mere occupancy/payment often insufficient).", "all": 4, "recent": 1}, {"section": "Land Contracts & Closing", "point": "SOF exception - equitable estoppel", "gist": "Detrimental, reasonable, foreseeable reliance on the oral/defective agreement equitably estops the other party from asserting the SOF.", "all": 3, "recent": 0}, {"section": "Land Contracts & Closing", "point": "Option contract", "gist": "An option to buy land is within the SOF and must be supported by consideration to be irrevocable (e.g., deposit credited/refundable supplies it).", "all": 2, "recent": 0}, {"section": "Land Contracts & Closing", "point": "Rule Against Perpetuities (options)", "gist": "RAP applies to options to purchase land; FL uses USRAP wait-and-see 90-year period; an option exercised within the period vests timely and is valid.", "all": 2, "recent": 0}, {"section": "Land Contracts & Closing", "point": "Equitable conversion", "gist": "On signing an enforceable land K equitable title (and risk of loss) passes to buyer; seller keeps legal/bare title until closing; either party may seek specific performance.", "all": 3, "recent": 0}, {"section": "Land Contracts & Closing", "point": "Marketable title", "gist": "Seller must convey marketable title at closing - title a reasonable buyer would accept, free of undisclosed encumbrances; a mortgage payable from proceeds is acceptable.", "all": 1, "recent": 0}, {"section": "Land Contracts & Closing", "point": "Seller's duty to disclose latent defects (Johnson v. Davis)", "gist": "FL residential seller must disclose known material latent defects not readily observable to buyer; an 'as is' clause does NOT waive this duty; no duty for commercial sales (caveat emptor).", "all": 2, "recent": 0}, {"section": "Land Contracts & Closing", "point": "Deed delivery and acceptance", "gist": "A valid deed requires delivery with present intent to convey title plus acceptance; recording raises a presumption of delivery; signed deed left undelivered (e.g., in a drawer) passes nothing; no consideration needed (gift deed valid).", "all": 6, "recent": 3}, {"section": "Land Contracts & Closing", "point": "Merger doctrine", "gist": "At closing the land contract merges into the deed; buyer's later title remedies lie on the deed covenants, not the contract's marketable-title promise.", "all": 1, "recent": 0}, {"section": "Land Contracts & Closing", "point": "Specific performance / land-contract remedies", "gist": "Land is unique, so specific performance lies to enforce a land K; unavailable against a seller no longer holding title (then damages = market price minus contract price).", "all": 3, "recent": 0}, {"section": "Deeds & Title Covenants", "point": "Warranty deed - covenants of title", "gist": "General warranty deed gives 6 covenants - present (seisin, right to convey, against encumbrances; breach at closing, do not run) and future (quiet enjoyment, warranty, further assurances; run with land); breach lets grantee sue grantor.", "all": 4, "recent": 0}, {"section": "Deeds & Title Covenants", "point": "Special warranty deed", "gist": "A special warranty deed warrants only against defects/encumbrances arising during the grantor's own ownership; a pre-acquisition lien is not a breach.", "all": 1, "recent": 0}, {"section": "Recording Acts & Priorities", "point": "Recording act - FL is a pure NOTICE jurisdiction", "gist": "FL is pure-notice: a subsequent BFP for value without notice (actual/constructive-record/inquiry) of a prior unrecorded interest prevails; recording is not required for validity between grantor and grantee, only protection vs. later BFPs.", "all": 11, "recent": 3}, {"section": "Recording Acts & Priorities", "point": "Inquiry notice from possession", "gist": "Open/visible possession by someone other than the seller charges a buyer with inquiry notice of that occupant's rights; failure to inspect/inquire defeats BFP status.", "all": 7, "recent": 0}, {"section": "Recording Acts & Priorities", "point": "Constructive notice from recording / lis pendens", "gist": "A properly recorded instrument (deed, mortgage, judgment, lis pendens) gives subsequent takers constructive notice; an unrecorded interest is unperfected against later BFPs.", "all": 3, "recent": 1}, {"section": "Recording Acts & Priorities", "point": "BFP status - value and good faith", "gist": "A BFP must pay valuable consideration (adequacy not scrutinized) without notice; a donee or judgment creditor gives no value and is not a BFP; without a protected BFP, common-law first-in-time controls.", "all": 5, "recent": 0}, {"section": "Estates & Concurrent Ownership", "point": "Concurrent estates - tenancy in common", "gist": "TIC is the default cotenancy: each holds an undivided fractional share with right to use the whole, may sell/lien/devise the share; no survivorship unless expressly stated.", "all": 2, "recent": 0}, {"section": "Estates & Concurrent Ownership", "point": "Joint tenancy with right of survivorship", "gist": "JTWROS needs the four unities (time, title, interest, possession) plus express survivorship language (FL presumes TIC absent it); survivor takes outside probate; in lien-theory FL one JT's mortgage does not sever, and a creditor must partition to reach a JT's share.", "all": 3, "recent": 1}, {"section": "Estates & Concurrent Ownership", "point": "Tenancy by the entirety", "gist": "Conveyance to spouses is presumed TBE (four unities + marriage; no strawman needed); each owns undivided 100% with survivorship; exempt from a creditor of only ONE spouse but reachable by a joint creditor; severed only by death, divorce, or mutual consent.", "all": 7, "recent": 3}, {"section": "Estates & Concurrent Ownership", "point": "Effect of divorce on TBE", "gist": "Final dissolution judgment (not mere filing/separation) converts TBE into a tenancy in common, exposing each half to that spouse's creditors; remarriage does not recreate TBE without affirmative reconveyance.", "all": 2, "recent": 1}, {"section": "Estates & Concurrent Ownership", "point": "Partition", "gist": "Judicial partition is available only to concurrent owners with present possessory interests; a remainderman cannot partition while a life tenant holds possession.", "all": 1, "recent": 1}, {"section": "Estates & Concurrent Ownership", "point": "Life estate and remainder", "gist": "A grantor may convey a life estate with a remainder (vested if no condition precedent); the life tenant has present possession, the remainderman a future interest.", "all": 2, "recent": 1}, {"section": "Estates & Concurrent Ownership", "point": "Life tenant's duty - waste", "gist": "A life tenant owes remaindermen a duty not to commit waste - voluntary/affirmative, permissive (failure to maintain or pay taxes, limited to income/value), or ameliorative; remaindermen may enjoin and cannot be charged for ameliorative improvements.", "all": 2, "recent": 2}, {"section": "Homestead, Exemptions & Liens", "point": "Homestead - constitutional definition / acreage", "gist": "FL homestead = natural person's primary residence, up to 1/2 acre within a municipality or 160 contiguous acres outside; one per person; non-contiguous land excluded; no dollar-value cap.", "all": 10, "recent": 2}, {"section": "Homestead, Exemptions & Liens", "point": "Homestead - protection from creditors / forced sale", "gist": "Homestead is exempt from forced sale by general creditors EXCEPT purchase-money mortgages, taxes, mechanic's/construction (improvement) liens, and association liens; not protected if it arose after the lien or to evade creditors.", "all": 8, "recent": 3}, {"section": "Homestead, Exemptions & Liens", "point": "Homestead - spousal joinder to alienate/encumber", "gist": "Homestead cannot be sold, gifted, or mortgaged without the non-owner spouse's joinder/consent even if titled in one name; a conveyance/mortgage without it is void regardless of buyer's notice (waivable by prenup).", "all": 6, "recent": 0}, {"section": "Homestead, Exemptions & Liens", "point": "Homestead - devise/descent restriction", "gist": "Homestead cannot be devised if survived by a spouse or minor child; surviving spouse takes a life estate (or elects 1/2 fee TIC) with remainder to descendants; inures to family regardless of will.", "all": 2, "recent": 0}, {"section": "Homestead, Exemptions & Liens", "point": "Homestead - proceeds reinvestment exemption", "gist": "Proceeds from a homestead sale stay creditor-exempt if held in good faith with intent to reinvest in a new homestead within a reasonable time, up to the amount reinvested.", "all": 3, "recent": 1}, {"section": "Homestead, Exemptions & Liens", "point": "Homestead - abandonment", "gist": "Homestead lasts until abandoned = leaving with intent not to return as regular abode (new permanent residence/changed license); courts construe liberally to preserve it; a non-residing co-owner may abandon her share.", "all": 3, "recent": 1}, {"section": "Homestead, Exemptions & Liens", "point": "Homestead - mobile home / permanency", "gist": "Homestead requires permanency; a mobile home qualifies if title is retired/annexed to the land, but if separately titled and readily movable it may be treated as a vehicle.", "all": 2, "recent": 0}, {"section": "Homestead, Exemptions & Liens", "point": "Homestead - portability (Save Our Homes)", "gist": "The homestead assessment-cap benefit is portable to a new homestead, limited to the value/acreage of the new property (tax exemption does not otherwise carry over).", "all": 1, "recent": 0}, {"section": "Homestead, Exemptions & Liens", "point": "Other creditor exemptions (non-homestead personalty)", "gist": "FL Const. gives a $1,000 personal-property exemption ($4,000 add'l if no homestead claimed); head-of-household wages (>50% support of a dependent) are exempt from garnishment even when deposited if traceable; UFTA voids transfers made to defraud creditors.", "all": 1, "recent": 0}, {"section": "Homestead, Exemptions & Liens", "point": "Judgment lien attachment (real vs. personal property)", "gist": "A money judgment becomes a lien on real property only when a certified copy is recorded in the county where the land lies; on personalty only after a Judgment Lien Certificate is filed with the Secretary of State.", "all": 1, "recent": 0}, {"section": "Mortgages & Foreclosure", "point": "Mortgage - lien theory", "gist": "FL is a lien-theory state: the mortgagee holds a lien, not title; a mortgage is an interest in real property; one cotenant's/spouse's mortgage reaches only that owner's interest.", "all": 1, "recent": 0}, {"section": "Mortgages & Foreclosure", "point": "Purchase-money mortgage", "gist": "A PMM (loan funds used to acquire/improve the property) has priority over other creditor interests and is not defeated by the homestead exemption.", "all": 2, "recent": 2}, {"section": "Mortgages & Foreclosure", "point": "Taking subject to vs. assuming a mortgage", "gist": "A grantee who takes 'subject to' (deed silent) is not personally liable - lender may only foreclose; one who 'assumes' becomes personally liable for the debt/deficiency; original mortgagor stays liable absent release/novation; assumption >1yr must satisfy SOF.", "all": 3, "recent": 3}, {"section": "Mortgages & Foreclosure", "point": "Due-on-sale clause", "gist": "A due-on-sale clause accelerates the debt on a sale/transfer of the property; a gratuitous gift (no sale) does not trigger it.", "all": 1, "recent": 1}, {"section": "Mortgages & Foreclosure", "point": "Mortgage foreclosure - standing, parties, priority", "gist": "FL requires judicial foreclosure; plaintiff must show default and standing (own the note before filing) and join all junior interests; foreclosure of a senior lien extinguishes properly-noticed juniors but leaves seniors intact (first-in-time priority).", "all": 3, "recent": 3}, {"section": "Mortgages & Foreclosure", "point": "Foreclosure sale proceeds & deficiency / redemption", "gist": "Proceeds pay the mortgagee first, surplus to owner; mortgagee may pursue a deficiency against the personally-liable mortgagor (not a subject-to grantee); debtor may redeem by paying all due before the judicial sale (equity of redemption).", "all": 4, "recent": 2}, {"section": "Mortgages & Foreclosure", "point": "Foreclosure purchaser's rights over existing tenant", "gist": "A foreclosure-sale purchaser may either honor an existing lease or terminate it on 30 days' notice.", "all": 1, "recent": 1}, {"section": "Easements, Covenants & Servitudes", "point": "Easement - creation and classification", "gist": "An easement is a nonpossessory right to use another's land; appurtenant benefits a dominant tenement and runs with the land, in gross is personal (non-commercial in-gross non-transferable); may be express (writing + 2 witnesses if >1yr), by reservation, affirmative/negative.", "all": 3, "recent": 1}, {"section": "Easements, Covenants & Servitudes", "point": "Easement by necessity", "gist": "Requires prior common ownership and strict necessity (landlocked) at severance; servient owner may pick a reasonable location; terminates when necessity ends (alternative access arises).", "all": 3, "recent": 0}, {"section": "Easements, Covenants & Servitudes", "point": "Prescriptive easement", "gist": "FL prescriptive easement = use that is open & notorious, continuous, and adverse/hostile (without permission) for 20 years; no exclusivity required; permission defeats prescription.", "all": 3, "recent": 0}, {"section": "Easements, Covenants & Servitudes", "point": "Tacking (prescription/AP)", "gist": "Successive possessors in privity may tack their periods to satisfy the statutory period.", "all": 1, "recent": 0}, {"section": "Easements, Covenants & Servitudes", "point": "Easement - scope and surcharge", "gist": "Use is limited to reasonable use benefiting the original dominant estate; expanding the burden (extending to after-acquired land or recreational-to-commercial) is excessive and gives the servient owner a surcharge/injunction action (runs to owner at time of overuse), not forfeiture.", "all": 2, "recent": 1}, {"section": "Easements, Covenants & Servitudes", "point": "Easement - duty to repair/maintain", "gist": "The easement holder must maintain and repair the easement; where both parties use it, repair costs may be apportioned.", "all": 1, "recent": 0}, {"section": "Easements, Covenants & Servitudes", "point": "Easement - termination", "gist": "An express easement is irrevocable absent agreement; mere nonuse does not terminate it - abandonment needs nonuse plus an objective act showing intent never to use again; may also end by prescription (20 yrs) or merger.", "all": 2, "recent": 2}, {"section": "Easements, Covenants & Servitudes", "point": "Real covenants and equitable servitudes", "gist": "Burden of a real covenant runs at law with writing, intent, touch & concern, horizontal + vertical privity, and notice (remedy = damages); an equitable servitude needs writing, intent, touch & concern, and notice but NO privity (remedy = injunction).", "all": 1, "recent": 1}, {"section": "Easements, Covenants & Servitudes", "point": "No right to light, air, or view", "gist": "There is no property right to light, air, or aesthetic view; blockage is not compensable absent a nuisance or taking.", "all": 1, "recent": 0}, {"section": "Adverse Possession", "point": "Adverse possession - elements", "gist": "Possession must be open & notorious, hostile/under claim of right, actual, exclusive, and continuous for the statutory period; FL statutory AP = 7 years (vs. 20 yrs prescription); good-faith mistaken-belief possession may defeat hostility.", "all": 2, "recent": 0}, {"section": "Adverse Possession", "point": "Adverse possession - color of title vs. taxes", "gist": "Under color of title (recorded deed) the possessor may claim the whole described parcel; without color of title the possessor must make a return to the property appraiser and pay all taxes during the 7-year period.", "all": 2, "recent": 0}, {"section": "Landlord-Tenant", "point": "Landlord-tenant - leasehold estates / tenancy at sufferance", "gist": "A fixed-term lease is a tenancy for years; a holdover without permission becomes a tenancy at sufferance, and FL allows DOUBLE rent against a bad-faith holdover (Stat. 83.06/83.58).", "all": 2, "recent": 1}, {"section": "Landlord-Tenant", "point": "Periodic tenancy - notice to terminate", "gist": "If a term lease fails, a periodic (month-to-month) tenancy arises from periodic rent; FL requires not less than 30 days' notice (s. 83.57(3), as amended eff. 7/1/2023) prior to the end of the monthly period to terminate a residential month-to-month tenancy, with period-matched notice for other periodic terms.", "all": 2, "recent": 1}, {"section": "Landlord-Tenant", "point": "Landlord's duty to deliver possession", "gist": "Under the FL/majority (English) rule the landlord must deliver actual possession at lease start; a holdover occupant present is a breach letting tenant avoid or recover.", "all": 1, "recent": 0}, {"section": "Landlord-Tenant", "point": "Implied warranty of habitability", "gist": "A residential lease carries a non-waivable implied warranty of habitability; on breach the tenant may repair-and-deduct, terminate, or withhold rent (and must escrow withheld/accruing rent into the court registry in an eviction).", "all": 2, "recent": 1}, {"section": "Landlord-Tenant", "point": "Landlord's statutory duty to repair", "gist": "FL landlord has a statutory duty to maintain (roof, windows/screens, heat, hot water, working appliances, ordinary wear and tear); repair duty may be shifted to tenant by lease only for single-family homes or duplexes.", "all": 2, "recent": 1}, {"section": "Landlord-Tenant", "point": "Covenant of quiet enjoyment / constructive eviction", "gist": "Landlord must not substantially interfere with the tenant's use; constructive eviction requires substantial interference, notice, failure to cure in a reasonable time, AND the tenant must vacate within a reasonable time.", "all": 2, "recent": 1}, {"section": "Landlord-Tenant", "point": "No self-help eviction / judicial process", "gist": "FL landlord cannot use self-help; must give statutory notice (3 days nonpayment, 7 days other noncompliance) and pursue eviction in court; retaliatory eviction for asserting habitability rights is prohibited.", "all": 3, "recent": 2}, {"section": "Landlord-Tenant", "point": "Assignment vs. sublease / privity", "gist": "Transfer of the entire remaining term = assignment; transfer of less = sublease; original tenant stays liable via privity of contract, an assignee via privity of estate while in possession, a sublessee has no privity with landlord; anti-assignment clauses are narrowly construed and waived by consent/accepting rent (Dumpor).", "all": 1, "recent": 0}, {"section": "Landlord-Tenant", "point": "Landlord's duty to mitigate / tenant's duty", "gist": "On a tenant's abandonment the FL landlord must make reasonable efforts to re-let and recovers only the post-mitigation deficiency (credited by the security deposit); the tenant likewise cannot deliberately increase damages.", "all": 1, "recent": 0}, {"section": "Landlord-Tenant", "point": "Security deposit return procedure", "gist": "FL Stat. 83.49: to keep a deposit the landlord must give written notice of intent/reason within the statutory period (30 days), after which the tenant has 15 days to object.", "all": 1, "recent": 0}, {"section": "Landlord-Tenant", "point": "Purchaser takes subject to existing lease/option", "gist": "A buyer of leased property takes subject to the existing lease and its terms (including any purchase option) of which the buyer has notice; a prudent buyer obtains an estoppel letter from the tenant.", "all": 0, "recent": 0}], "Wills & Administration of Estates": [{"section": "Will Validity & Execution", "point": "Freedom of testation / nature of a will", "gist": "A testator may devise property freely; executing a will is not a present transfer/conveyance, so it does not violate an injunction barring transfer of assets.", "all": 1, "recent": 0}, {"section": "Will Validity & Execution", "point": "Will execution & validity", "gist": "A validly executed will may devise 'all that I own'; FL treats a general residuary-type description as a sufficient property description.", "all": 2, "recent": 0}, {"section": "Will Validity & Execution", "point": "Testamentary capacity", "gist": "A will/gift/amendment is void if the donor/testator lacked sound mind and capacity (e.g., terminal illness) at the time of execution/conveyance.", "all": 1, "recent": 0}, {"section": "Will Validity & Execution", "point": "Certainty of bequests", "gist": "A bequest allowing the legatee to choose (e.g., 'so much personal property up to $1,000') is valid if bounded in kind and amount and does not impair others' gifts.", "all": 1, "recent": 0}, {"section": "Components & Limits on Testamentary Gifts", "point": "Revocation of provisions by divorce", "gist": "FL: dissolution/divorce voids provisions favoring the ex-spouse in a will or will substitute, treating the ex-spouse as having predeceased, UNLESS the will or the dissolution/divorce judgment expressly provides otherwise.", "all": 1, "recent": 0}, {"section": "Components & Limits on Testamentary Gifts", "point": "Pretermitted / disinherited children", "gist": "Pretermitted-child share protects ONLY children born or adopted AFTER the will; an adult child alive at execution is not pretermitted and may be intentionally disinherited; biological and adopted children treated equally; property not effectively devised passes by intestacy to children.", "all": 2, "recent": 0}, {"section": "Components & Limits on Testamentary Gifts", "point": "Ademption by extinction", "gist": "A specific devise (e.g., identified stock) adeems to the extent the property is no longer in the estate/trust at the testator's death.", "all": 1, "recent": 0}, {"section": "Components & Limits on Testamentary Gifts", "point": "No exoneration of liens", "gist": "FL abolished common-law exoneration: a devisee takes encumbered property subject to the lien unless the will expressly directs exoneration.", "all": 1, "recent": 0}, {"section": "Bars & Survivorship Rules on Distribution", "point": "Slayer statute (killer forfeiture)", "gist": "FL slayer rule: one who unlawfully and intentionally kills the decedent forfeits all benefits and is treated as having predeceased; the share passes as if the killer predeceased.", "all": 1, "recent": 0}, {"section": "Bars & Survivorship Rules on Distribution", "point": "Simultaneous Death Act", "gist": "FL USDA: where order of death cannot be established, each is deemed to have predeceased the other for distribution; FL has no 120-hour rule, and the act is inapplicable where survival order is clear.", "all": 2, "recent": 0}, {"section": "Intestate Succession", "point": "Intestate succession", "gist": "FL intestacy: if all descendants are the spouse's (and decedent has no other descendants), spouse takes entire estate; if decedent has a descendant who is NOT the spouse's, spouse takes 1/2 and descendants take 1/2.", "all": 2, "recent": 0}, {"section": "Intestate Succession", "point": "Intestate succession", "gist": "On intestacy (including improperly devised property), property descends to lineal descendants per stirpes; adopted and biological children share equally; minor children take homestead remainder after spouse's life estate.", "all": 2, "recent": 0}, {"section": "Homestead", "point": "Homestead protection", "gist": "FL homestead = owner's principal residence, up to 1/2 acre municipal / 160 acres rural; vacant non-residence land does not qualify.", "all": 1, "recent": 0}, {"section": "Homestead", "point": "Homestead protection", "gist": "Married owner cannot devise or alienate homestead (except to spouse) without spousal joinder/consent, and homestead cannot be devised if survived by a spouse or minor child; improper devise → surviving spouse takes a life estate with remainder to descendants per stirpes; restriction inapplicable if no spouse and only adult children.", "all": 6, "recent": 2}, {"section": "Homestead", "point": "Homestead protection", "gist": "Surviving spouse may elect a 1/2 undivided tenancy-in-common interest in lieu of the life estate; failure to elect leaves the spouse with the life estate.", "all": 1, "recent": 1}, {"section": "Homestead", "point": "Homestead protection", "gist": "Homestead is exempt from creditors' claims and passes outside the estate; creditor claims are paid from non-exempt assets.", "all": 1, "recent": 0}, {"section": "Spousal Protection / Elective Share", "point": "Elective share", "gist": "FL surviving spouse may elect 30% of the elective estate, which includes the decedent's revocable inter vivos trust, joint accounts, and inter vivos transfers within 1 year of death; absent a valid waiver/prenup.", "all": 3, "recent": 0}, {"section": "Future Interests Limits (RAP)", "point": "Rule Against Perpetuities", "gist": "RAP voids contingent future interests that may not vest within lives in being plus 21 years; does not apply to vested remainders or life estates; a remainder to an ascertainable charity is vested.", "all": 1, "recent": 0}], "Family Law": [{"section": "Dissolution Threshold (Grounds, Jurisdiction & Validity)", "point": "Grounds for dissolution (no-fault)", "gist": "FL is no-fault; sole grounds are irretrievable breakdown (only one spouse need believe) or a spouse adjudicated mentally incapacitated 3+ years; if breakdown denied or minor children, court may order counseling/continuance up to 3 months but cannot force reconciliation.", "all": 6, "recent": 2}, {"section": "Dissolution Threshold (Grounds, Jurisdiction & Validity)", "point": "Residency, SMJ, personal jurisdiction & venue", "gist": "Court has SMJ if petitioner (or respondent) was a FL resident 6 months before filing (proof by driver's license/affidavit); needs personal jurisdiction over respondent (residency/long-arm) only for support/property; venue lies where parties last resided together or petitioner resides.", "all": 6, "recent": 2}, {"section": "Dissolution Threshold (Grounds, Jurisdiction & Validity)", "point": "Simplified vs. circuit court dissolution", "gist": "Dissolution involving real property or a minor child cannot use simplified procedure and must be filed in circuit court.", "all": 0, "recent": 0}, {"section": "Dissolution Threshold (Grounds, Jurisdiction & Validity)", "point": "Annulment", "gist": "A marriage by one lacking capacity (or bigamous) is void ab initio and annullable, assertable by anyone without prior court leave; an annulled marriage is treated as never occurring, so no permanent alimony (only limited pendente lite).", "all": 1, "recent": 1}, {"section": "Dissolution Threshold (Grounds, Jurisdiction & Validity)", "point": "Premarital/postnuptial agreements", "gist": "Prenup/postnup must be in writing and signed; valid absent fraud, duress, overreaching, or unconscionability (marriage is consideration); full financial disclosure not required unless unconscionable; may waive alimony and homestead but NOT child support.", "all": 3, "recent": 1}, {"section": "Equitable Distribution of Property", "point": "Equitable distribution - classification & presumption", "gist": "Court first classifies marital vs. non-marital, then distributes marital assets/liabilities equitably with a presumption of equal (50/50) split unless statutory factors justify unequal division.", "all": 11, "recent": 2}, {"section": "Equitable Distribution of Property", "point": "Marital vs. non-marital property", "gist": "Marital = acquired during marriage by either spouse, interspousal gifts, entireties property; non-marital = pre-marital property kept separate, gifts/inheritance/bequests to one spouse, and property exchanged for non-marital assets; assets/debts acquired after filing are non-marital.", "all": 8, "recent": 2}, {"section": "Equitable Distribution of Property", "point": "Enhancement/active appreciation of non-marital property", "gist": "Increase in value of non-marital property from marital labor/funds (remodeling, mortgage paydown, active business appreciation) is marital; passive (market) appreciation stays non-marital; owner credited the asset's value at acquisition.", "all": 6, "recent": 1}, {"section": "Equitable Distribution of Property", "point": "Special equity (abolished)", "gist": "Special equity has been abolished in FL; a spouse contributing non-marital funds must instead seek unequal distribution, which fails where the funds were commingled into jointly titled property.", "all": 3, "recent": 0}, {"section": "Equitable Distribution of Property", "point": "Commingling, tracing & titling presumptions", "gist": "Non-marital funds keep their character only if traceable; commingling into a joint account converts them to marital; jointly titled / tenancy-by-entireties property is presumed marital (interspousal gift), rebuttable by
