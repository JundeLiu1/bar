showing convenience titling and donor intent.", "all": 4, "recent": 1}, {"section": "Equitable Distribution of Property", "point": "Retirement, pension & military benefits", "gist": "Retirement/pension benefits (401k, military, vested or non-vested) accrued during the marriage are marital (coverture portion); pre-marriage accruals remain non-marital.", "all": 2, "recent": 0}, {"section": "Equitable Distribution of Property", "point": "Personal injury settlement classification", "gist": "Settlement components are characterized by what they replace: lost wages during marriage and medical expenses paid with marital funds are marital; pain/suffering and post-divorce components are non-marital.", "all": 1, "recent": 1}, {"section": "Equitable Distribution of Property", "point": "Dissipation of marital assets (adultery)", "gist": "Adultery/misconduct affects distribution only to the extent marital funds were dissipated on the affair; court may add back the funds spent.", "all": 2, "recent": 0}, {"section": "Equitable Distribution of Property", "point": "Equitable distribution factors", "gist": "Factors justifying unequal division: length of marriage, each spouse's contribution (incl. homemaker), economic circumstances, intentional dissipation, desirability of keeping an asset intact, and any factor for justice/equity.", "all": 2, "recent": 0}, {"section": "Equitable Distribution of Property", "point": "Marital home - award of exclusive use/possession", "gist": "Home acquired during marriage is marital even if titled in one spouse's name; court may award exclusive use/possession to the primary residential parent until children reach majority when in their best interest, then order sale.", "all": 3, "recent": 1}, {"section": "Alimony", "point": "Alimony - need and ability to pay", "gist": "Alimony turns on the recipient's need and the payor's ability to pay, weighing duration of marriage, age/health, financial resources, standard of living, and contributions; FL has abolished permanent alimony.", "all": 9, "recent": 3}, {"section": "Alimony", "point": "Types of alimony & marriage-length brackets", "gist": "FL types: temporary (pendente lite, non-waivable), bridge-the-gap (max 2 yrs, non-modifiable), rehabilitative (requires written plan, max 5 yrs), durational (capped by % of marriage length, none if marriage <3 yrs); short-term <10, moderate 10-20, long-term 20+ yrs.", "all": 10, "recent": 5}, {"section": "Alimony", "point": "Permanent periodic alimony (long-term marriage)", "gist": "Permanent periodic alimony (historic) was favored for long-term marriages (17+ yr presumption); ends on death or remarriage and was modifiable on substantial change; short marriages rarely qualified.", "all": 0, "recent": 0}, {"section": "Alimony", "point": "Adultery's effect on alimony", "gist": "Adultery is not a basis to award or deny alimony unless it depleted/dissipated marital assets.", "all": 2, "recent": 0}, {"section": "Alimony", "point": "Imputation of income", "gist": "Income may be imputed to a voluntarily unemployed/underemployed spouse based on earning ability, reducing claimed need or supporting a support obligation.", "all": 1, "recent": 1}, {"section": "Child Support", "point": "Child support - guidelines (income shares)", "gist": "Both parents owe support; amount set by FL statutory income-shares guidelines (combined net income, number of children, overnights, health insurance, child care); deviation of 5%+ requires written findings.", "all": 8, "recent": 1}, {"section": "Child Support", "point": "Substantial-timesharing (gross-up) adjustment", "gist": "Gross-up (substantial-timesharing) method applies only when BOTH parents each have at least 20% of the overnights (73+ nights/yr); it then adjusts the support obligation, which remains independent of the timesharing schedule.", "all": 1, "recent": 0}, {"section": "Child Support", "point": "Duration of child support", "gist": "Support runs to age 18 (or 19 if still in high school progressing toward a diploma before 19), continues indefinitely for a dependent disabled child; no college duty absent agreement; no automatic reapportionment when one child ages out.", "all": 3, "recent": 0}, {"section": "Child Support", "point": "Non-waivability of child support", "gist": "The right to child support belongs to the child and cannot be waived or capped by parental agreement; an anti-modification or waiver clause is unenforceable.", "all": 2, "recent": 1}, {"section": "Child Support", "point": "Imputed income for child support (voluntary unemployment)", "gist": "A parent cannot evade support by voluntarily becoming unemployed/underemployed; income may be imputed based on earning capacity.", "all": 0, "recent": 0}, {"section": "Parenting, Time-Sharing & Custody Jurisdiction", "point": "Parenting plan & time-sharing", "gist": "FL replaced 'custody' with a parenting plan (required in any dissolution with minor children) setting time-sharing and decision-making, all governed by the best interest of the child.", "all": 5, "recent": 0}, {"section": "Parenting, Time-Sharing & Custody Jurisdiction", "point": "Best interests of the child standard & factors", "gist": "All time-sharing/custody/relocation decisions use the best-interest standard (no gender/parental presumption), weighing continuity/stability, each parent's ability to foster the other's relationship, fitness, caregiving role, and the child's preference (more weight with maturity/age).", "all": 9, "recent": 3}, {"section": "Parenting, Time-Sharing & Custody Jurisdiction", "point": "Effect of misconduct (domestic violence/adultery) on custody", "gist": "A parent's conduct affects custody only if it harms the child; domestic violence witnessed by a child weighs against the abuser; adultery not harming the children does not bar custody.", "all": 1, "recent": 0}, {"section": "Parenting, Time-Sharing & Custody Jurisdiction", "point": "Shared vs. sole parental responsibility", "gist": "FL presumes shared parental responsibility (joint major decisions) with shared time-sharing in the child's best interest; sole responsibility/100% time-sharing awarded only if shared would be detrimental to the child or the other's rights are terminated.", "all": 6, "recent": 1}, {"section": "Parenting, Time-Sharing & Custody Jurisdiction", "point": "Natural-parent preference over third parties", "gist": "A biological/legal parent's right to custody/time-sharing supersedes grandparents/third parties unless contrary to the child's best interest; no support/custody order where neither party is a legal parent.", "all": 1, "recent": 0}, {"section": "Parenting, Time-Sharing & Custody Jurisdiction", "point": "Relocation of child (50-mile statute)", "gist": "Relocating a child 50+ miles for 60+ days requires written consent or court approval; relocating parent bears the initial burden of showing the move is in the child's best interest with a revised time-sharing plan, then burden shifts to the objecting parent.", "all": 5, "recent": 1}, {"section": "Parenting, Time-Sharing & Custody Jurisdiction", "point": "UCCJEA jurisdiction", "gist": "Initial custody jurisdiction lies in the child's home state (where the child lived with a parent 6 consecutive months before filing); the decree state retains exclusive continuing jurisdiction while a parent/child stays connected; significant-connection jurisdiction applies only if no home state.", "all": 5, "recent": 2}, {"section": "Modification & Enforcement", "point": "Modification of time-sharing/custody", "gist": "Time-sharing/parental responsibility is modifiable only on a substantial and material change in circumstances (post-2023 FL law no longer requires the change be unanticipated) plus a showing that modification serves the child's best interest.", "all": 3, "recent": 1}, {"section": "Modification & Enforcement", "point": "Modification of alimony", "gist": "Alimony (unless a valid non-mod clause) is modifiable on a substantial, permanent, involuntary change not contemplated at judgment; a good-faith involuntary income loss qualifies; a payor may reduce/terminate on a supportive relationship/cohabitation (61.14) by clear and convincing evidence; modification retroactive only to filing.", "all": 2, "recent": 1}, {"section": "Modification & Enforcement", "point": "Modification of child support", "gist": "Child support modifiable on a substantial change (income, health/child-care, time-sharing); a 15%-or-$50 difference is presumed substantial; modification retroactive only to the date the petition was filed; past voluntary excess payments are not credited.", "all": 3, "recent": 1}, {"section": "Modification & Enforcement", "point": "Non-modifiable awards (lump-sum/equitable distribution)", "gist": "Lump-sum alimony and equitable-distribution awards are vested and non-modifiable, unlike periodic support; characterization (support vs. property division) controls modifiability.", "all": 1, "recent": 0}, {"section": "Modification & Enforcement", "point": "Enforcement - contempt, arrearages & unclean hands", "gist": "Civil contempt is available for unpaid support (not equitable distribution): movant shows an order and non-payment, then obligor must prove present inability to pay; accrued arrearages vest as they come due and survive modification; a payor's unilateral self-help reduction is barred by unclean hands.", "all": 1, "recent": 0}, {"section": "Fees, Settlements & Ancillary Matters", "point": "Attorney's fees in dissolution (need/ability)", "gist": "Under FS 61.16 the court may award attorney's fees in dissolution/modification based on one party's need and the other's ability to pay, to equalize the parties' access to counsel.", "all": 5, "recent": 3}, {"section": "Fees, Settlements & Ancillary Matters", "point": "Settlement agreements & enforcement", "gist": "A marital settlement/property agreement incorporated into the final judgment is binding and enforceable per its terms (e.g., maintaining a life-insurance policy naming the children).", "all": 1, "recent": 0}, {"section": "Fees, Settlements & Ancillary Matters", "point": "Effect of divorce on life-insurance beneficiary", "gist": "Upon dissolution, designation of the former spouse as a life-insurance beneficiary is void by operation of law (will-substitute terminated by divorce).", "all": 1, "recent": 0}, {"section": "Fees, Settlements & Ancillary Matters", "point": "Dissolution injunctions (freeze/abatement)", "gist": "A mutual injunction freezing marital assets pending dissolution abates on a party's death because the dissolution can no longer proceed; obtaining a DV injunction does not forfeit the victim's right to support.", "all": 2, "recent": 0}, {"section": "Fees, Settlements & Ancillary Matters", "point": "Mediation confidentiality", "gist": "Mediation is ADR with a neutral; offers and statements made in mediation are confidential and inadmissible.", "all": 1, "recent": 1}, {"section": "Parentage, Termination & Adoption", "point": "Paternity - marital presumption & disestablishment", "gist": "A child born during a valid marriage is presumed the husband's, rebuttable only by impossibility; a husband who knew at divorce is barred from later disestablishment/genetic testing; no marital presumption if parents were unmarried at birth.", "all": 3, "recent": 2}, {"section": "Parentage, Termination & Adoption", "point": "Unwed father - establishing parental rights", "gist": "An unwed biological father must show commitment (support during pregnancy/birth costs if child under 6 months; substantial steps to a relationship if older) to gain protected rights and notice; paternity provable by DNA, but late assertion after abandonment weakens the claim.", "all": 1, "recent": 1}, {"section": "Parentage, Termination & Adoption", "point": "Termination of parental rights - standards & due process", "gist": "Parents have a fundamental liberty interest entitling them to due process in TPR (notice, right to appointed counsel, GAL for the child); the state must prove grounds by clear and convincing evidence; TPR is individual to each parent.", "all": 2, "recent": 2}, {"section": "Parentage, Termination & Adoption", "point": "Grounds for TPR (abandonment/abuse/neglect)", "gist": "Grounds include abandonment, abuse, neglect, failure to comply with a case plan 12+ months, child dependent 12 of last 22 months, egregious conduct, or long incarceration; failure to protect a child or continued drug use can support TPR; safe-haven surrender supports termination.", "all": 2, "recent": 2}, {"section": "Parentage, Termination & Adoption", "point": "Voluntary termination - consent & undue influence", "gist": "A legal parent's voluntary consent to termination must be knowing and free of duress/undue influence after notice; consent is invalid only if a person of authority exercised improper control.", "all": 1, "recent": 1}, {"section": "Parentage, Termination & Adoption", "point": "Duty to report child abuse", "gist": "Every person who knows/suspects child abuse must report via the central abuse hotline (reports may be anonymous); certain professionals are mandatory reporters subject to penalties.", "all": 1, "recent": 1}, {"section": "Parentage, Termination & Adoption", "point": "Adoption - who may adopt & be adopted", "gist": "Any adult (married couple, same-sex couple post-Obergefell, single individual, stepparent) may adopt; court weighs fitness/best interest and may prefer blood relatives; anyone (incl. an adult) may be adopted.", "all": 3, "recent": 2}, {"section": "Parentage, Termination & Adoption", "point": "Adoption - consents required", "gist": "Consent required from each parent, the child if 12+ (court may waive), any guardian, and the spouse of a married adult adoptee; parental consent excused if rights terminated or the parent abandoned/never acknowledged paternity of a child born out of wedlock.", "all": 3, "recent": 2}, {"section": "Parentage, Termination & Adoption", "point": "Adoption procedure - TPR, home study & trial residence", "gist": "Adoption requires prior TPR, background checks, home study, and a best-interests finding; court may require a six-month placement before finalizing but may waive it where the child has long resided with the petitioner.", "all": 2, "recent": 2}, {"section": "Parentage, Termination & Adoption", "point": "Effect of adoption on support obligations", "gist": "A valid adoption severs the natural parent's ties and ends the future support obligation, making the adoptive parent solely responsible; but adoption does not extinguish accrued, vested child-support arrearages (a child's right).", "all": 2, "recent": 1}, {"section": "Parentage, Termination & Adoption", "point": "Grandparents' rights / standing in TPR & adoption", "gist": "Grandparents generally lack standing and are not entitled to notice in TPR/adoption; a relative-placement/custody preference or limited visitation may apply only in narrow circumstances (e.g., child resided with them 6 months within last 24).", "all": 3, "recent": 3}, {"section": "Homestead & Trust Property in Divorce", "point": "Homestead - alienation requires spousal joinder", "gist": "Homestead occupied by a married owner cannot be conveyed without spousal joinder; a deed lacking the spouse's joinder is void, and the spouse prevails in ejectment.", "all": 1, "recent": 0}, {"section": "Homestead & Trust Property in Divorce", "point": "Trust interest as separate property in divorce", "gist": "A beneficiary-spouse's trust interest naming only her (not her spouse), kept separate and not commingled, is non-marital and not subject to equitable distribution.", "all": 1, "recent": 0}], "Criminal Law & Con. Crim. Pro.": [{"section": "General Principles of Criminal Liability", "point": "Elements of a crime: actus reus, mens rea, causation", "gist": "Every crime requires a voluntary act (actus reus), the requisite mental state (mens rea: general, specific, or malice), and causation linking act to result.", "all": 2, "recent": 1}, {"section": "General Principles of Criminal Liability", "point": "Burden of proof", "gist": "State must prove every element of the offense beyond a reasonable doubt.", "all": 1, "recent": 1}, {"section": "Substantive Crimes", "point": "First-degree murder", "gist": "FL first-degree murder = premeditated/deliberate killing (fully formed conscious intent to kill, time to reflect), enumerated felony murder, or killing from unlawful drug distribution.", "all": 2, "recent": 1}, {"section": "Substantive Crimes", "point": "Felony murder", "gist": "Killing during an enumerated felony by a felon/co-felon is first-degree felony murder. But where a NON-participant (victim, bystander, or police) does the killing, the surviving felon is NOT guilty of first-degree felony murder and is instead guilty of SECOND-degree felony murder under Fla. Stat. 782.04(3) (Florida rejects the pure agency theory).", "all": 2, "recent": 1}, {"section": "Substantive Crimes", "point": "Second-degree (depraved-heart) murder", "gist": "FL second-degree murder = killing by an act imminently dangerous evincing a depraved mind (ill will, spite, malice), without premeditation.", "all": 3, "recent": 1}, {"section": "Substantive Crimes", "point": "Manslaughter (voluntary and involuntary)", "gist": "Voluntary = heat-of-passion killing on adequate provocation with no cooling-off (also imperfect self-defense); involuntary = killing during a misdemeanor/non-felony or by reckless indifference to life.", "all": 2, "recent": 1}, {"section": "Substantive Crimes", "point": "Vehicular homicide", "gist": "FL vehicular homicide = killing caused by operating a motor vehicle in a reckless manner (conscious disregard of substantial, unjustifiable risk) likely to cause death/great bodily harm; no knowledge of injury required.", "all": 1, "recent": 1}, {"section": "Substantive Crimes", "point": "Battery", "gist": "FL battery = intentional, unconsented harmful or offensive touching of another (incl. clothing); a specific-intent crime in FL (unlike common-law general intent).", "all": 2, "recent": 1}, {"section": "Substantive Crimes", "point": "Robbery", "gist": "Taking property from a person/presence by force or threat of force; force to complete or retain the taking suffices and must be contemporaneous with the taking.", "all": 1, "recent": 1}, {"section": "Substantive Crimes", "point": "Larceny", "gist": "Trespassory taking and carrying away (asportation, slight movement suffices) of another's personal property with intent to permanently deprive.", "all": 1, "recent": 1}, {"section": "Substantive Crimes", "point": "Burglary", "gist": "FL burglary = entering/remaining in a structure with intent to commit an offense therein; no breaking/dwelling/nighttime element; an invitee to an open business does not trespass, so no burglary.", "all": 2, "recent": 2}, {"section": "Substantive Crimes", "point": "Lewd/lascivious battery (statutory rape) and strict liability", "gist": "FL: sexual activity with a person under the age of consent; generally strict liability, so good-faith mistake of age is no defense (no scienter as to age).", "all": 1, "recent": 1}, {"section": "Substantive Crimes", "point": "Drug offenses: possession/sale of controlled substance", "gist": "FL crime to knowingly transport, sell, or possess a controlled substance.", "all": 1, "recent": 0}, {"section": "Inchoate Crimes & Parties to Crime", "point": "Conspiracy", "gist": "FL conspiracy = agreement between two or more to commit an unlawful act with intent; NO overt act required (differs from common law/MEE).", "all": 2, "recent": 2}, {"section": "Inchoate Crimes & Parties to Crime", "point": "Co-conspirator (Pinkerton) liability", "gist": "Each conspirator is liable as a principal for crimes committed by co-conspirators in furtherance of the conspiracy (unless effective withdrawal).", "all": 2, "recent": 2}, {"section": "Inchoate Crimes & Parties to Crime", "point": "Solicitation", "gist": "Enlisting/asking another to commit a crime; the request alone completes the offense; merges into the completed target crime.", "all": 1, "recent": 1}, {"section": "Inchoate Crimes & Parties to Crime", "point": "Accomplice / aiding and abetting (parties to crime)", "gist": "One who aids/encourages the principal with intent is liable to the same extent as the principal; FL treats the accessory before the fact as a principal.", "all": 2, "recent": 2}, {"section": "Inchoate Crimes & Parties to Crime", "point": "Accessory after the fact", "gist": "FL accessory after the fact = knowingly aiding the offender to avoid capture; family-member exception applies unless the underlying crime is a capital/first/second/third-degree felony as specified by statute.", "all": 1, "recent": 1}, {"section": "Defenses", "point": "Self-defense / Stand Your Ground", "gist": "FL: no duty to retreat where lawfully present; deadly force only on reasonable belief it is necessary to prevent imminent death/great bodily harm; force must be proportionate.", "all": 1, "recent": 1}, {"section": "Defenses", "point": "Defense of others", "gist": "One may use force to defend another if reasonably believing the third person would be entitled to use such force in self-defense.", "all": 1, "recent": 1}, {"section": "Defenses", "point": "Aggressor's withdrawal / loss of self-defense", "gist": "When the aggressor clearly withdraws (backs away, hands up), the other party may not then use deadly force; doing so negates the self-defense claim.", "all": 1, "recent": 1}, {"section": "Defenses", "point": "Imperfect self-defense", "gist": "An honest but unreasonable belief in the need for deadly force reduces murder to manslaughter rather than acquitting.", "all": 1, "recent": 1}, {"section": "Defenses", "point": "Insanity (M'Naghten)", "gist": "Due to mental disease, defendant did not know the nature of the act or that it was wrong; defendant bears burden by clear and convincing evidence.", "all": 1, "recent": 0}, {"section": "Defenses", "point": "Voluntary intoxication", "gist": "FL: voluntary intoxication is NOT a defense to any crime unless the intoxicant was lawfully prescribed by a physician.", "all": 1, "recent": 1}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Fourth Amendment threshold: REP, standing, FL coterminous", "gist": "4th Am. protects where a reasonable expectation of privacy exists; rights are personal (standing—cannot assert another's REP, e.g. overnight guest yes, mere visitor no); FL art. I sec. 12 is coterminous with the 4th Am.", "all": 5, "recent": 2}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Curtilage, open fields, and abandonment", "gist": "REP extends to the home's curtilage but NOT to open fields (even if fenced/posted) or property abandoned (e.g., cigarette on a public sidewalk).", "all": 2, "recent": 2}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Third-party doctrine (info exposed to another)", "gist": "No REP in information voluntarily exposed to a third party who could disclose it (e.g., texts another received).", "all": 1, "recent": 1}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Warrant requirement: probable cause, particularity, neutral magistrate", "gist": "Searches of areas with a REP presumptively require a warrant on probable cause (totality), with particular description of place/items, issued by a neutral and detached magistrate, unless an exception applies; search must cease once item found/scope exhausted.", "all": 5, "recent": 3}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Arrest: probable cause, public vs. home (Payton)", "gist": "Officer may arrest without a warrant in public on probable cause; arrest in a home requires an arrest warrant absent exigency/consent, and an arrest warrant does not authorize a search of the home for evidence.", "all": 3, "recent": 3}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Terry stop and traffic stop (reasonable suspicion, pretext)", "gist": "Officer may make an investigatory/traffic stop on reasonable suspicion of a violation/crime; subjective pretext does not invalidate a stop supported by an observed violation (Whren); calibrated radar/observation can give PC.", "all": 3, "recent": 2}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Search incident to lawful arrest (person and grab area)", "gist": "Incident to a lawful custodial arrest, police may search the arrestee's person and immediate grab area without a warrant; plain-feel permits seizing items immediately apparent as contraband.", "all": 3, "recent": 3}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Search incident to arrest of a vehicle (Gant)", "gist": "A vehicle may be searched incident to arrest only if the arrestee is unsecured and within reach of the passenger compartment, or there is reason to believe it contains evidence of the crime of arrest.", "all": 2, "recent": 1}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Cell phone search requires a warrant (Riley)", "gist": "Police may not search the digital contents of a seized cell phone incident to arrest without a warrant; lack of passcode does not eliminate the REP.", "all": 3, "recent": 3}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Automobile exception", "gist": "With probable cause that a vehicle contains evidence/contraband, police may search any part (incl. trunk and closed containers) where it could be hidden, without a warrant; stale/unrelated tip gives no PC.", "all": 3, "recent": 2}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Exigent circumstances exception", "gist": "Warrantless entry permitted for emergencies/danger to life, hot pursuit of a dangerous fleeing felon, or imminent destruction of evidence; hot pursuit does not justify entry for a mere misdemeanor.", "all": 4, "recent": 2}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Consent exception (actual/apparent authority, third party)", "gist": "Voluntary consent by one with actual or apparent authority waives the warrant requirement for common areas; a co-occupant cannot consent to another's exclusive property, and an open door is not implied consent to enter.", "all": 2, "recent": 2}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Plain view doctrine", "gist": "An officer lawfully present may seize an item whose incriminating character is immediately apparent without further manipulation; fails if the officer's vantage/presence was unlawful or item is concealed.", "all": 5, "recent": 4}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Protective sweep", "gist": "Incident to arrest/entry, officers may sweep places a person could hide for officer safety where they reasonably believe others pose danger; ends once suspect found and cannot extend to spaces too small to hide a person.", "all": 2, "recent": 2}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Inventory and inevitable discovery", "gist": "Inventory searches are lawful only as a routine standardized police practice; illegally obtained evidence is admissible if it inevitably would have been lawfully discovered.", "all": 2, "recent": 1}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "School searches", "gist": "Students have a REP, but searches require only reasonable suspicion; suspicionless random searches risk violating the 4th Am.; lockers carry a lower expectation of privacy.", "all": 1, "recent": 0}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Special-needs / mandatory blood draw and suspicionless testing", "gist": "A compelled blood draw is a 4th Am. search; absent individualized suspicion or a special-needs justification it is unreasonable; FL bars suspicionless drug testing of all employees.", "all": 1, "recent": 1}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Exclusionary rule", "gist": "Evidence obtained in violation of the 4th/5th Am. is inadmissible against the person searched; FL follows the federal exclusionary rule.", "all": 4, "recent": 1}, {"section": "Fourth Amendment: Searches, Seizures & Exclusion", "point": "Fruit of the poisonous tree", "gist": "Derivative evidence/statements obtained from an unlawful search/seizure are excluded as fruit of the poisonous tree to deter misconduct.", "all": 3, "recent": 3}, {"section": "Fifth Amendment & Miranda", "point": "Miranda: custody and interrogation defined", "gist": "Miranda warnings required before custodial interrogation; custody = reasonable person would not feel free to leave; interrogation = words/conduct police should know are reasonably likely to elicit an incriminating response.", "all": 9, "recent": 6}, {"section": "Fifth Amendment & Miranda", "point": "Volunteered / spontaneous statements", "gist": "Spontaneous, unprompted statements not made in response to interrogation (or made pre-custody/at home not in custody) are admissible without Miranda warnings.", "all": 4, "recent": 2}, {"section": "Fifth Amendment & Miranda", "point": "Undercover/state-agent statements not interrogation", "gist": "A statement to someone the suspect does not know is a state agent (e.g., victim texting at police direction) is not custodial interrogation; a voluntary response is admissible.", "all": 1, "recent": 1}, {"section": "Fifth Amendment & Miranda", "point": "Adequacy of Miranda warnings", "gist": "Warnings need not be verbatim but must convey the substance, including the right to appointed counsel if indigent; omission renders custodial statements inadmissible.", "all": 1, "recent": 0}, {"section": "Fifth Amendment & Miranda", "point": "Public safety exception", "gist": "Police may question without Miranda when reasonably prompted by concern for officer/public safety (e.g., asking about hidden weapons); the answer is admissible.", "all": 1, "recent": 1}, {"section": "Fifth Amendment & Miranda", "point": "Miranda waiver", "gist": "A waiver must be knowing, voluntary, and intelligent; defective warnings or police discouraging counsel undermine a valid waiver; a confession is admissible if warned and validly waived.", "all": 3, "recent": 2}, {"section": "Fifth Amendment & Miranda", "point": "Invocation of right to counsel / silence (must be unequivocal)", "gist": "Invocation of counsel or silence must be clear and unequivocal; a clear request for counsel (not offense-specific) requires all questioning to cease until counsel present or suspect reinitiates; ambiguous remarks do not invoke.", "all": 4, "recent": 2}, {"section": "Fifth Amendment & Miranda", "point": "Physical fruits of a Miranda violation (Patane)", "gist": "Physical evidence derived from a voluntary statement taken in violation of Miranda is still admissible; the physical fruit is not suppressed.", "all": 1, "recent": 1}, {"section": "Sixth Amendment: Counsel & Identifications", "point": "Sixth Amendment right to counsel (attachment, offense-specific, deliberate elicitation)", "gist": "The 6th Am. right to counsel attaches at initiation of formal proceedings, is offense-specific, and bars the government from deliberately eliciting statements via an agent without counsel; a private person's statements are admissible until they become a cooperating government agent.", "all": 2, "recent": 2}, {"section": "Sixth Amendment: Counsel & Identifications", "point": "Ineffective assistance of counsel (Strickland)", "gist": "Defendant must show deficient performance below professional norms plus prejudice—a reasonable probability the result would have been different.", "all": 1, "recent": 1}, {"section": "Sixth Amendment: Counsel & Identifications", "point": "Suggestive identification / due process", "gist": "An identification is suppressed if an impermissibly suggestive procedure creates a substantial likelihood of misidentification.", "all": 1, "recent": 1}, {"section": "Sixth Amendment: Counsel & Identifications", "point": "Independent source for in-court ID", "gist": "Despite a suggestive lineup, an in-court ID is allowed if it has an independent source (the witness's prior observation of the suspect).", "all": 1, "recent": 1}, {"section": "Pretrial & Trial Procedure", "point": "Charging: indictment or information; juvenile direct file", "gist": "A felony is filed in circuit court by indictment or information; in FL a juvenile (14+) committing certain violent felonies may be tried as an adult by mandatory or discretionary direct file.", "all": 2, "recent": 1}, {"section": "Pretrial & Trial Procedure", "point": "Competency to proceed", "gist": "If a defendant is incompetent, the court stays proceedings and orders evaluation by 2-3 mental health experts; competency is periodically reviewed.", "all": 1, "recent": 0}, {"section": "Pretrial & Trial Procedure", "point": "Pretrial release / bond", "gist": "FL Constitution presumes entitlement to pretrial release unless charged with a capital/life offense where proof is evident; denial requires findings that no conditions assure safety/appearance—preventing a misdemeanor re-offense is insufficient.", "all": 1, "recent": 1}, {"section": "Pretrial & Trial Procedure", "point": "Double jeopardy", "gist": "Jeopardy attaches when the jury is sworn (or first witness sworn in a bench trial); bars reprosecution for the same offense and lesser/greater included offenses (Blockburger same-elements test); mistrial (esp. defense-sought) does not bar retrial—only acquittal or reversal for insufficient evidence does.", "all": 2, "recent": 1}, {"section": "Pretrial & Trial Procedure", "point": "Juvenile sentencing / disposition options", "gist": "Juveniles adjudicated as juveniles have broader dispositions (non-custodial conditions, juvenile detention); trial as an adult removes those options and exposes the juvenile to adult incarceration.", "all": 1, "recent": 1}], "Florida Constitutional Law": [{"section": "Justiciability & Standing", "point": "Standing", "gist": "Challenger must show actual or threatened injury in fact from the law; must be directly/personally affected by the invalid provision.", "all": 2, "recent": 0}, {"section": "Separation of Powers & Judicial Structure", "point": "Separation of powers (Art. II s.3 — stricter than federal)", "gist": "FL separation of powers is strict; one branch may not exercise powers belonging to another (executive doing appellate review encroaches on judiciary).", "all": 3, "recent": 1}, {"section": "Separation of Powers & Judicial Structure", "point": "Separation of powers", "gist": "Judicial power may not be vested in an administrative/executive officer; agencies limited to civil-fine/traffic-infraction authority — subpoena/injunctive/equitable power encroaches on judiciary.", "all": 2, "recent": 1}, {"section": "Separation of Powers & Judicial Structure", "point": "Separation of powers", "gist": "FL Supreme Court has exclusive authority over rules of court practice/procedure; legislature may repeal a rule only by 2/3 vote of each house, cannot amend or delegate that power.", "all": 1, "recent": 0}, {"section": "Separation of Powers & Judicial Structure", "point": "FL Supreme Court jurisdiction", "gist": "FL Supreme Court's discretionary jurisdiction is fixed by the Constitution and legislature CANNOT enlarge it; mandatory jurisdiction = bond validation, death penalty, decisions declaring a statute/constitutional provision invalid.", "all": 2, "recent": 0}, {"section": "Separation of Powers & Judicial Structure", "point": "DCA territorial appellate jurisdiction", "gist": "Each DCA hears appeals only from its own district; no DCA may be given statewide appellate jurisdiction over a class of cases.", "all": 1, "recent": 0}, {"section": "Legislative Process & Lawmaking Limits", "point": "Single subject rule (Art. III s.6)", "gist": "Every law (except general appropriations/codes) must embrace ONE subject and matter properly connected, briefly expressed in a non-misleading title; combining unrelated provisions violates it.", "all": 6, "recent": 2}, {"section": "Legislative Process & Lawmaking Limits", "point": "Title and enacting clause requirements", "gist": "Valid FL statute needs an enacting clause ('Be it Enacted by the Legislature of the State of Florida') and a title that fairly/non-misleadingly states the subject; absence renders the law void.", "all": 5, "recent": 1}, {"section": "Legislative Process & Lawmaking Limits", "point": "Legislative procedure / floor amendments", "gist": "Improper to amend a bill on the floor to add an unrelated provision or alter other bills during floor debate of one bill.", "all": 1, "recent": 0}, {"section": "Legislative Process & Lawmaking Limits", "point": "Special session scope", "gist": "Governor may call a special session; legislature may consider only the proclaimed subjects unless 2/3 of each house votes to expand scope.", "all": 1, "recent": 0}, {"section": "Legislative Process & Lawmaking Limits", "point": "Gubernatorial veto / override", "gist": "Governor has 7 days (15 if presented after adjournment) to veto; inaction lets the bill become law; legislature may override by 2/3 of both houses, but if it adjourns sine die without overriding, the veto stands.", "all": 2, "recent": 0}, {"section": "Legislative Process & Lawmaking Limits", "point": "Special law vs. general law of local application", "gist": "A special law (named locality/closed-class population bracket) requires prior published notice or local referendum; a general law of local application is valid if the classification has a rational nexus to the law's purpose.", "all": 5, "recent": 2}, {"section": "Legislative Process & Lawmaking Limits", "point": "Special law vs. general law", "gist": "No special law/general law of local application on taxation, elections, juries, conditions precedent to suit (e.g., a bond before filing), venue, or rules of evidence.", "all": 1, "recent": 0}, {"section": "Individual Rights & Liberties", "point": "Access to courts (Art. I s.21 — Kluger test)", "gist": "Courts open for redress without sale/denial/delay; legislature may abolish/limit a cause of action only by providing a reasonable alternative OR showing overpowering public necessity with no alternative means (Kluger).", "all": 8, "recent": 4}, {"section": "Individual Rights & Liberties", "point": "Access to courts", "gist": "Filing/access fees must be waivable for indigents; assigning a class of suits lowest docket priority and charging a non-waivable advancement fee burdens access and invades judicial docket control.", "all": 1, "recent": 0}, {"section": "Individual Rights & Liberties", "point": "Right to jury trial (Art. I s.22)", "gist": "Right to jury trial is secure and inviolate for all cases where it existed at common law when the FL Constitution (1845) was adopted; legislature cannot remove it for such actions.", "all": 2, "recent": 0}, {"section": "Individual Rights & Liberties", "point": "Procedural due process", "gist": "No deprivation of life/liberty/property without notice and an opportunity to be heard before an impartial decisionmaker; amount of process measured by Mathews factors (private interest, risk of error, government interest).", "all": 7, "recent": 4}, {"section": "Individual Rights & Liberties", "point": "Substantive due process", "gist": "Law burdening a fundamental right = strict scrutiny (narrowly tailored/least restrictive means to a compelling interest); non-fundamental economic regulation = rational basis (rational relation to a legitimate purpose).", "all": 7, "recent": 3}, {"section": "Individual Rights & Liberties", "point": "Equal protection (FL)", "gist": "FL uses strict scrutiny (suspect class/fundamental right) or rational basis only (NO intermediate scrutiny); FL suspect classes add physical disability and religion to race/national origin; wealth/age/economic classes get rational basis.", "all": 8, "recent": 4}, {"section": "Individual Rights & Liberties", "point": "FL right of privacy (Art. I s.23)", "gist": "Express fundamental right to be let alone, broader than federal; government intrusion triggers strict scrutiny (compelling interest, least restrictive means); covers medical records, phone contents; protects private lives, not officials acting in official capacity.", "all": 10, "recent": 6}, {"section": "Individual Rights & Liberties", "point": "Freedom of speech and assembly", "gist": "FL protects speech/assembly; sidewalks are traditional public forums; content-based restrictions get strict scrutiny; content-neutral time/place/manner rules must be narrowly tailored to a significant interest and leave open ample alternative channels.", "all": 3, "recent": 2}, {"section": "Individual Rights & Liberties", "point": "Establishment / no-aid (Blaine) provision", "gist": "FL no-aid (Blaine) provision is stricter than federal — bars public funds directly OR indirectly in aid of any church/sectarian institution; FL still applies the Lemon test (secular purpose, primary effect neither advancing/inhibiting religion, no excessive entanglement).", "all": 4, "recent": 3}, {"section": "Individual Rights & Liberties", "point": "Right to work", "gist": "FL Constitution guarantees the right to work/be rewarded for labor; employment cannot be conditioned on union membership or non-membership (no closed shop).", "all": 2, "recent": 1}, {"section": "Individual Rights & Liberties", "point": "Right to keep and bear arms", "gist": "FL Constitution protects the right to bear arms (manner may be regulated); a voluntary monetary incentive to surrender firearms does not regulate/ban and survives.", "all": 1, "recent": 1}, {"section": "Individual Rights & Liberties", "point": "Impairment of contracts", "gist": "No FL law shall substantially impair the obligation of existing contracts without sufficient justification; public contracts get higher scrutiny; weakest where the state is not a contracting party.", "all": 3, "recent": 2}, {"section": "Individual Rights & Liberties", "point": "Police power", "gist": "State/county may regulate for public health, safety, welfare, and morals; non-fundamental regulation must be rationally related to a legitimate purpose (rational basis).", "all": 3, "recent": 1}, {"section": "Individual Rights & Liberties", "point": "Void for vagueness / overbreadth", "gist": "A law is void if so vague it fails to give a person of ordinary intelligence notice of prohibited conduct, or so overbroad it sweeps/burdens more than necessary to achieve its purpose.", "all": 3, "recent": 1}, {"section": "Takings & Eminent Domain", "point": "Takings / eminent domain — just compensation", "gist": "Government may take property for a public purpose only with just compensation = fair market value (highest and best use); a fixed statutory cap below FMV is unconstitutional; provision focuses on real property.", "all": 3, "recent": 2}, {"section": "Takings & Eminent Domain", "point": "Regulatory taking / inordinate burden", "gist": "A categorical taking occurs only on total deprivation of all economically beneficial use; partial diminution is not categorical; FL Bert Harris allows recovery for permanent loss of reasonably-expected use or a disproportionate/inordinate burden.", "all": 2, "recent": 1}, {"section": "Takings & Eminent Domain", "point": "Inverse condemnation", "gist": "Where government effectively appropriates/destroys property's value without formal condemnation, owner may sue for inverse condemnation (recovery = damage to property); weaker where there is an actual physical taking.", "all": 3, "recent": 1}, {"section": "Takings & Eminent Domain", "point": "Nuisance / public-health exception to compensation", "gist": "No just compensation owed when government destroys property posing an immediate, serious threat to public health/safety (abatement of nuisance).", "all": 1, "recent": 0}, {"section": "State Structure, Local Government & Sovereign Immunity", "point": "Sovereign immunity waiver", "gist": "FL waives sovereign immunity for operational/ministerial torts, capped at $200,000 per person / $300,000 per incident (per occurrence); recovery above the cap requires a legislative claim bill. Discretionary planning-level decisions remain immune.", "all": 2, "recent": 1}, {"section": "State Structure, Local Government & Sovereign Immunity", "point": "Municipal/county home rule powers", "gist": "Municipalities and charter counties have broad home-rule power to enact ordinances for health/safety/welfare/morals not inconsistent with general law or the FL/US Constitution; non-charter counties act only under legislatively granted powers.", "all": 6, "recent": 4}, {"section": "State Structure, Local Government & Sovereign Immunity", "point": "Home rule limits — ordinance/statute conflict & power to create crimes", "gist": "Local criminal ordinances conflicting with the state interest in uniform criminal laws are preempted; municipalities may create ordinance violations but may NOT create crimes punishable by imprisonment — only the State legislature may define crimes.", "all": 2, "recent": 1}, {"section": "State Structure, Local Government & Sovereign Immunity", "point": "County constitutional officers", "gist": "Sheriff, Clerk, Property Appraiser are independent constitutional officers; a charter cannot strip the sheriff's constitutional status; discipline/removal of a sheriff is at the state (Governor) level.", "all": 1, "recent": 1}, {"section": "State Structure, Local Government & Sovereign Immunity", "point": "Felon disqualification from office", "gist": "A convicted felon is ineligible to hold FL office unless civil rights are restored, regardless of charter qualifications.", "all": 1, "recent": 1}, {"section": "Public Finance & Taxation", "point": "Public finance — public credit, bonds, and tax/fee distinction", "gist": "FL bars lending public credit to a private entity (incidental private benefit OK if public purpose); GO bonds pledge full faith/credit (ad valorem taxes) and require a referendum, revenue bonds do not; a charge generating surplus for an unrelated project is an unauthorized tax, not a fee.", "all": 1, "recent": 0}, {"section": "Public Finance & Taxation", "point": "Ad valorem taxation — state bar & exemptions", "gist": "The State may not levy ad valorem property tax (only counties/municipalities/school districts/special districts may); applies to real property not motor vehicles; homestead gets $25k + additional $25k exemption with Save Our Homes cap (lesser of 3% or CPI); municipal property is exempt only if used for a governmental/public purpose.", "all": 3, "recent": 0}, {"section": "Government Transparency & State Action", "point": "Sunshine Law / open meetings & public records (Art. I s.24)", "gist": "Meetings of two or more board members discussing public business must be open, noticed, and recorded, and records are presumptively open; applies to public bodies vested with governmental authority, not private entities absent state action.", "all": 5, "recent": 4}, {"section": "Government Transparency & State Action", "point": "State action doctrine", "gist": "A private entity becomes a state actor subject to constitutional/public-records duties when government is so intertwined with it that the two are effectively joined (lease + operation + indemnity + government official on board).", "all": 1, "recent": 0}, {"section": "Government Transparency & State Action", "point": "Public-records exemptions & privacy exception", "gist": "A statute exempting records must serve a legitimate public purpose and not be vague/overbroad (redaction preferred over wholesale exemption); constitutionally private data may be shielded even for a state actor; sealing court records requires public necessity, no broader than necessary.", "all": 2, "recent": 1}, {"section": "Criminal & Retroactivity Protections", "point": "Bill of attainder", "gist": "Legislation imposing punishment on a person/group without a judicial trial is void.", "all": 1, "recent": 0}, {"section": "Criminal & Retroactivity Protections", "point": "Ex post facto", "gist": "A law may not retroactively punish conduct lawful when done; an ordinance punishing pre-enactment conduct is ex post facto.", "all": 1, "recent": 1}, {"section": "Criminal & Retroactivity Protections", "point": "Double jeopardy / Blockburger", "gist": "No second punishment for the same offense in the same jurisdiction unless each offense requires proof of an element the other does not (Blockburger); a county is not a separate sovereign from the state.", "all": 2, "recent": 2}, {"section": "Criminal & Retroactivity Protections", "point": "Excessive bail / pretrial release & judicial bail function", "gist": "FL prohibits excessive bail; non-capital defendants have a right to pretrial release tied to flight risk/danger; setting bail is a judicial function, so a legislative body mandating a fixed bond usurps the judiciary.", "all": 1, "recent": 1}, {"section": "Criminal & Retroactivity Protections", "point": "Privileges and immunities", "gist": "A state cannot discriminate against out-of-state citizens; a law applying equally to in- and out-of-state persons survives.", "all": 0, "recent": 0}, {"section": "Criminal & Retroactivity Protections", "point": "Victim's rights (Marsy's Law)", "gist": "FL Constitution gives crime victims the right to notice and to be present at proceedings; a victim may be excluded from witness sequestration only on a finding that presence would substantially prejudice the defendant.", "all": 1, "recent": 1}, {"section": "Criminal & Retroactivity Protections", "point": "Search & seizure standing — reasonable expectation of privacy", "gist": "A person has standing to challenge a search/seizure where he has a reasonable expectation of privacy; a driver has REP in his vehicle, though lesser than in a home.", "all": 1, "recent": 1}, {"section": "Severability", "point": "Severability", "gist": "Unconstitutional portions of a statute may be severed and the remainder left in force if the valid parts can stand alone consistent with legislative intent.", "all": 2, "recent": 0}], "Federal/US Constitutional Law": [{"section": "Justiciability & Standing", "point": "Justiciability - Standing", "gist": "Standing needs (1) injury in fact - concrete & particularized, actual/imminent (not 'someday' speculation, Lujan); (2) causation/traceability; (3) redressability. 1st Am: credible threat chilling speech = injury (pre-enforcement OK). Parents sue in child's name.", "all": 7, "recent": 6}, {"section": "Justiciability & Standing", "point": "Justiciability - Standing", "gist": "Org sues for members if (1) members could sue, (2) interest germane to org's purpose, (3) claim/relief needs no individual member participation.", "all": 1, "recent": 1}, {"section": "Justiciability & Standing", "point": "Justiciability - Ripeness & Mootness", "gist": "Need live case/controversy. Not ripe if injury hypothetical (e.g. still a bill, not law); ripe once citations/non-discretionary criteria fix the record. Issuance of citations defeats mootness.", "all": 2, "recent": 2}, {"section": "Justiciability & Standing", "point": "Justiciability - No advisory opinions", "gist": "Federal courts decide only actual cases/controversies; no advisory opinions (President cannot request one from the Supreme Court).", "all": 1, "recent": 1}, {"section": "Justiciability & Standing", "point": "Private cause of action", "gist": "A statute expressly authorizing injured persons to sue for damages creates a private cause of action.", "all": 1, "recent": 1}, {"section": "State Action & Federal Judicial Power", "point": "State action requirement", "gist": "Constitutional rights run only against state actors. Public school/board/county ordinance/arrest = state action. Private actor only if performing traditionally public function. Private university owes no due process (rights from contract only).", "all": 4, "recent": 2}, {"section": "State Action & Federal Judicial Power", "point": "Federal judicial power & jurisdiction", "gist": "Original jurisdiction over controversies between a State and the US. Congress may enlarge/restrict appellate jurisdiction (Exceptions Clause) but may not eliminate an entire subject of review.", "all": 2, "recent": 1}, {"section": "State Action & Federal Judicial Power", "point": "Sovereign immunity / Eleventh Amendment", "gist": "States immune from suit in federal court (11th Am); may waive. Exception: suit against state official for prospective relief (no money from state treasury) - Ex parte Young.", "all": 2, "recent": 1}, {"section": "Separation of Powers & Federal Legislative Powers", "point": "Separation of powers - Legislative process", "gist": "Bill must pass both houses by majority + be presented to President. President signs or vetoes; pocket veto if President declines to act and Congress adjourns within the period. Congress overrides by 2/3 of each house. Line-item veto unconstitutional.", "all": 1, "recent": 1}, {"section": "Separation of Powers & Federal Legislative Powers", "point": "Congressional powers - Commerce Power", "gist": "Congress may regulate (1) channels, (2) instrumentalities/persons/things in, and (3) activities substantially affecting interstate commerce (aggregate).", "all": 1, "recent": 1}, {"section": "Separation of Powers & Federal Legislative Powers", "point": "Congressional powers - Taxing & Spending", "gist": "Congress may condition federal funds on state action if (1) for general welfare, (2) unambiguous, (3) related to funded program, (4) not unduly coercive (a small % of funds, like the ~5% in Dole, is OK; threatening loss of funds amounting to a large share of a state's budget, as in NFIB Medicaid expansion, is coercive).", "all": 1, "recent": 1}, {"section": "Separation of Powers & Federal Legislative Powers", "point": "Federalism - Anti-commandeering & state police power", "gist": "Congress may not compel/commandeer state legislatures or agencies to enact/enforce a federal program (Printz); may only incentivize via spending conditions or preemption. 10th Am reserves police power (health/safety/welfare/licensing) to states.", "all": 2, "recent": 2}, {"section": "Federalism & Limits on State Power", "point": "Supremacy Clause / Preemption", "gist": "Federal law is supreme; state law in an area governed by federal law (e.g. FDCA) is preempted to the extent of conflict. Local/county acts subordinate to FL and US Constitutions.", "all": 2, "recent": 1}, {"section": "Federalism & Limits on State Power", "point": "Dormant Commerce Clause", "gist": "State law discriminating against interstate commerce = virtually per se invalid (strict scrutiny; economic protectionism not legitimate). Non-discriminatory burden: Pike balancing - burden vs. local benefit.", "all": 2, "recent": 1}, {"section": "Federalism & Limits on State Power", "point": "Privileges & Immunities Clause (Art. IV)", "gist": "State may not discriminate against out-of-state residents as to fundamental rights/livelihood absent substantial justification. Corporations/aliens cannot invoke (individual US citizens only).", "all": 1, "recent": 1}, {"section": "Federalism & Limits on State Power", "point": "Contracts Clause", "gist": "State may not substantially impair existing private contracts (intermediate-type review); does not protect future/not-yet-existing contracts (negotiations).", "all": 1, "recent": 1}, {"section": "Incorporation", "point": "Incorporation & reverse incorporation", "gist": "14th Am substantive due process incorporates the Bill of Rights (incl. 1st Am) against the states. Equal protection applies to the federal government via the 5th Am Due Process Clause (reverse incorporation).", "all": 2, "recent": 1}, {"section": "First Amendment - Speech, Press & Religion", "point": "First Amendment - Free Speech framework", "gist": "Speech is fundamental. Content-based restriction = strict scrutiny (narrowly tailored/necessary to compelling interest, least restrictive means), presumptively unconstitutional. Content-neutral = intermediate review.", "all": 2, "recent": 1}, {"section": "First Amendment - Speech, Press & Religion", "point": "First Amendment - Unprotected/low-value categories", "gist": "Unprotected & regulable: incitement to imminent lawless action (Brandenburg - speech directed to AND likely to produce imminent lawless action), fighting words, true threats, obscenity, defamation. Offensive/indecent speech remains protected.", "all": 2, "recent": 1}, {"section": "First Amendment - Speech, Press & Religion", "point": "First Amendment - Commercial speech", "gist": "Truthful, non-misleading commercial speech: restriction must serve substantial interest + directly advance + narrowly tailored (Central Hudson). False/misleading commercial speech may be banned outright.", "all": 1, "recent": 1}, {"section": "First Amendment - Speech, Press & Religion", "point": "First Amendment - Press / publication of truthful info", "gist": "Press may not be punished for publishing truthful info lawfully obtained (e.g. public police report). Qualified privilege on matters of public concern; no protection for knowing/reckless falsity.", "all": 2, "recent": 1}, {"section": "First Amendment - Speech, Press & Religion", "point": "First Amendment - Public forum & time/place/manner", "gist": "Streets/parks = traditional public forums. Content-neutral TPM valid if (1) narrowly tailored to a significant/substantial interest and (2) leaves open ample alternative channels. Content/viewpoint-based = strict scrutiny.", "all": 3, "recent": 3}, {"section": "First Amendment - Speech, Press & Religion", "point": "First Amendment - Public forum & time/place/manner", "gist": "Peaceful assembly/petition protected; absent threatened violence or permit violation, forced dispersal violates 1st Am. Content-neutral conduct regs (e.g. camping ban) with purpose independent of speech upheld if reasonable.", "all": 2, "recent": 2}, {"section": "First Amendment - Speech, Press & Religion", "point": "First Amendment - Licensing/permit schemes", "gist": "Permit schemes valid only if content-neutral with definite standards + procedural safeguards. Invalid if officials have unbridled/unfettered discretion. Singling out subject matter (e.g. excluding political) triggers heightened scrutiny.", "all": 1, "recent": 1}, {"section": "First Amendment - Speech, Press & Religion", "point": "First Amendment - Vagueness & Overbreadth", "gist": "Void for vagueness if no fair notice to person of ordinary intelligence or no clear standards. Overbroad if it restricts/punishes substantially more protected speech than necessary (no exceptions).", "all": 6, "recent": 4}, {"section": "First Amendment - Speech, Press & Religion", "point": "First Amendment - Student speech", "gist": "Schools may regulate student speech that materially & substantially disrupts school operations or threatens safety (Tinker); reach over off-campus speech is limited.", "all": 1, "recent": 0}, {"section": "First Amendment - Speech, Press & Religion", "point": "First Amendment - Religion clauses", "gist": "Older Lemon test: secular purpose, primary effect neither advances nor inhibits religion, no excessive entanglement. Current test: history & tradition (Kennedy v. Bremerton). Neutral aid via private/independent choice (vouchers) does not establish religion.", "all": 2, "recent": 1}, {"section": "First Amendment - Speech, Press & Religion", "point": "First Amendment - Religion clauses", "gist": "Excluding entities from a generally available public benefit solely because they are religious violates Free Exercise (Trinity Lutheran/Espinoza - status discrimination).", "all": 1, "recent": 1}, {"section": "Due Process & Equal Protection", "point": "Procedural Due Process", "gist": "Deprivation of a protected life/liberty/property interest (public education, license, benefit) requires notice + opportunity to be heard before a neutral decisionmaker (Mathews balancing). Turns on whether a protected interest exists.", "all": 3, "recent": 2}, {"section": "Due Process & Equal Protection", "point": "Substantive Due Process", "gist": "Infringement of a fundamental right = strict scrutiny (necessary/narrowly tailored to compelling interest); else rational basis. Right to interstate travel is fundamental. Right to pursue a common occupation is NOT fundamental.", "all": 2, "recent": 2}, {"section": "Due Process & Equal Protection", "point": "Equal Protection - Tiers of scrutiny framework", "gist": "Suspect (race, national origin, alienage) = strict scrutiny. Quasi-suspect (gender, illegitimacy) = intermediate. Non-suspect (age, wealth, occupation) = rational basis. FL adds physical disability as suspect.", "all": 1, "recent": 1}, {"section": "Due Process & Equal Protection", "point": "Equal Protection - Suspect classifications (strict scrutiny)", "gist": "State alienage classification = strict scrutiny, UNLESS position tied to state self-government/political function (police, teachers) then rational basis. Owning a business does not qualify for the exception.", "all": 1, "recent": 1}, {"section": "Due Process & Equal Protection", "point": "Equal Protection - Quasi-suspect (intermediate scrutiny)", "gist": "Gender classification = intermediate scrutiny: substantially related to an important government interest, with an exceedingly persuasive justification. Mere disproportionate impact insufficient (need intent).", "all": 2, "recent": 2}, {"section": "Due Process & Equal Protection", "point": "Equal Protection - Non-suspect (rational basis)", "gist": "Age and wealth are NOT suspect/quasi-suspect (no federal intermediate tier for age); rational basis - upheld if rationally related to a legitimate interest, burden on challenger. Economic/residency lines likely survive.", "all": 5, "recent": 4}, {"section": "Remedies", "point": "Remedies - Severability", "gist": "Court may strike the unconstitutional portion and save the valid remainder if remainder stands independently (especially with a savings clause).", "all": 2, "recent": 1}], "Professional Responsibility": [{"section": "The Lawyer-Client Relationship", "point": "Competence and diligence", "gist": "Lawyer must provide competent (legal knowledge, skill) and diligent representation; can gain competence in a new area by study or associating experienced counsel; being 'distracted' is no excuse.", "all": 2, "recent": 2}, {"section": "The Lawyer-Client Relationship", "point": "Communication / duty to convey offers", "gist": "Lawyer must keep client reasonably informed and promptly convey ALL settlement/plea offers; the client (not lawyer) decides whether to accept.", "all": 2, "recent": 2}, {"section": "The Lawyer-Client Relationship", "point": "Allocation of authority / client controls objectives", "gist": "Client controls the objectives (settle, plea, testify, appeal); lawyer controls means/tactics; a third-party payor may not direct the case.", "all": 2, "recent": 1}, {"section": "The Lawyer-Client Relationship", "point": "Identity of client (minor) / who controls", "gist": "When representing a minor, the child is the client and is owed loyalty/confidentiality; the parents who pay do not control the representation.", "all": 1, "recent": 0}, {"section": "The Lawyer-Client Relationship", "point": "Client's right to discharge / withdrawal", "gist": "Client may discharge the lawyer at any time; continuing to act/file suit after a valid discharge is acting without authority and may be malpractice.", "all": 1, "recent": 0}, {"section": "Fees and Client Property", "point": "Reasonable fees", "gist": "All fees must be reasonable (time, novelty, skill, customary fee, results); basis/rate must be communicated to client, preferably in writing, ideally at the outset.", "all": 8, "recent": 2}, {"section": "Fees and Client Property", "point": "Contingent fee requirements", "gist": "FL contingent fee must be in writing, signed by client AND lawyer, state how fee/costs computed (before/after costs), include statement of client's rights with 3-day cancellation; sliding-scale caps (15-40%), a 50% fee is presumptively excessive.", "all": 9, "recent": 2}, {"section": "Fees and Client Property", "point": "Contingent fee prohibited in criminal / domestic-relations matters", "gist": "Contingent fees prohibited in criminal cases and in domestic-relations matters (fee tied to divorce, alimony, support, property division); collecting a fixed past-due award may be permissible.", "all": 4, "recent": 2}, {"section": "Fees and Client Property", "point": "Nonrefundable / flat fee", "gist": "A nonrefundable flat fee must be reasonable and in writing; a flat fee earned on receipt may be deposited in lawyer's own account rather than trust.", "all": 1, "recent": 1}, {"section": "Fees and Client Property", "point": "Division of fees / referral fees", "gist": "FL bars bare referral fees; lawyers in different firms may split only if client consents in writing to the split, total fee is reasonable, and division is proportional to work OR each assumes joint responsibility; in PI/property-damage cases primary lawyer does 75% unless court approves equal split.", "all": 3, "recent": 3}, {"section": "Fees and Client Property", "point": "Financial assistance / advancing costs to client", "gist": "Lawyer may advance court costs and litigation expenses with repayment contingent on outcome (and may pay outright for indigent client); may NOT lend money for living/personal expenses.", "all": 2, "recent": 1}, {"section": "Fees and Client Property", "point": "Safekeeping property / trust account / commingling (IOTA)", "gist": "Client/third-party funds must be held in a separate trust account, never commingled with lawyer's funds (only nominal funds for bank fees); disputed funds stay in trust until resolved; pooled short-term interest goes to FL Bar Foundation (IOTA).", "all": 3, "recent": 1}, {"section": "Confidentiality", "point": "Confidentiality", "gist": "Lawyer must not reveal information relating to the representation without informed consent; duty is broader than A-C privilege, covers prospective clients, and survives death/end of representation; may not disclose case matters to or update a third-party payor absent client consent.", "all": 7, "recent": 4}, {"section": "Confidentiality", "point": "Crime-fraud exception / candor duties trigger disclosure", "gist": "Confidentiality yields: mandatory disclosure to prevent crime causing death/substantial bodily harm; permissive disclosure to prevent client crime/fraud using lawyer's services; no protection for future/ongoing crime.", "all": 2, "recent": 1}, {"section": "Conflicts of Interest (Clients)", "point": "Concurrent conflict of interest", "gist": "No representation directly adverse to a current client or materially limited by duties to another, UNLESS lawyer reasonably believes he can competently/diligently represent each, it is lawful, not adverse in same tribunal, and each gives informed consent (confirmed in writing).", "all": 7, "recent": 3}, {"section": "Conflicts of Interest (Clients)", "point": "Dual representation (buyer/seller, co-parties)", "gist": "Lawyer may represent both sides only if interests not materially adverse, lawyer reasonably believes he can competently represent each, and both give informed written consent; adverse price terms + withheld material info bar it.", "all": 1, "recent": 0}, {"section": "Conflicts of Interest (Clients)", "point": "Conflict of interest - former client", "gist": "Lawyer may not represent a client materially adverse to a former client in the same or substantially related matter, nor use the former client's confidences against them, absent informed consent confirmed in writing; unrelated prior matters do not bar adverse representation.", "all": 9, "recent": 7}, {"section": "Conflicts of Interest (Clients)", "point": "Imputation of conflicts / screening", "gist": "One lawyer's conflict is imputed to the entire firm; the general cure is the affected client's informed consent confirmed in writing. Screening (timely screen, no fee to the tainted lawyer, written notice) avoids imputation only in limited situations (a migratory lawyer with no material confidential information, former-government lawyers, former judges/neutrals, and prospective-client matters), not for an ordinary former-client conflict; screening cannot cure a position directly adverse to a current firm client.", "all": 5, "recent": 4}, {"section": "Conflicts of Interest (Clients)", "point": "Former government lawyer (revolving door)", "gist": "Lawyer who participated personally and substantially in a matter while in government may not later represent a private client in that matter absent the agency's informed written consent; lawyer must be screened and apportioned no fee.", "all": 2, "recent": 2}, {"section": "Personal-Interest Conflicts", "point": "Business transaction with client", "gist": "Lawyer-client business deal allowed only if terms fair/reasonable and fully disclosed in writing, client advised in writing to seek independent counsel, and client gives written informed consent; applies even to lawyer acting as trustee.", "all": 8, "recent": 2}, {"section": "Personal-Interest Conflicts", "point": "Acquiring proprietary interest in litigation", "gist": "Lawyer may not acquire a proprietary interest in the cause of action or subject matter of litigation, except a lien to secure fees or a contingent fee; e.g., taking a mortgage/percentage of the disputed property is barred.", "all": 3, "recent": 0}, {"section": "Personal-Interest Conflicts", "point": "Gifts from client / drafting instrument benefiting self", "gist": "Lawyer may not solicit a substantial gift, nor prepare an instrument giving the lawyer (or firm member) a substantial gift, unless the client is a close relative; firm member's conflict is imputed.", "all": 3, "recent": 0}, {"section": "Personal-Interest Conflicts", "point": "Third-party payment of fees / independent judgment", "gist": "Lawyer may accept fees from a third party only if client gives informed consent, lawyer's independent professional judgment is preserved, and confidentiality is maintained; payor may not direct the representation.", "all": 4, "recent": 2}, {"section": "Personal-Interest Conflicts", "point": "Lawyer as necessary witness", "gist": "A lawyer likely to be a necessary fact witness may not act as advocate in the matter (subject to limited exceptions), to avoid the candor/confidentiality conflict.", "all": 1, "recent": 0}, {"section": "Duties to the Tribunal and Third Parties", "point": "Candor to the tribunal / client perjury", "gist": "Lawyer may not make false statements of fact/law to a tribunal or offer evidence known to be false; must counsel against perjury, take remedial measures (including disclosure) if a client testifies falsely, and may seek to withdraw.", "all": 2, "recent": 0}, {"section": "Duties to the Tribunal and Third Parties", "point": "Frivolous claims / good-faith certification", "gist": "Lawyer may not bring or defend a frivolous claim lacking legal/factual basis or asserted for delay/harassment; signature on pleadings certifies a proper purpose and good faith; sanctions and fee awards available.", "all": 3, "recent": 2}, {"section": "Duties to the Tribunal and Third Parties", "point": "Dealing with unrepresented person", "gist": "When dealing with an unrepresented party, lawyer must not state or imply disinterest, must clarify he represents only his client, and should advise the party to obtain independent counsel.", "all": 1, "recent": 0}, {"section": "Duties to the Tribunal and Third Parties", "point": "Contact with represented party / former employee", "gist": "Lawyer may not communicate about the matter with a represented party (incl. an organization's managerial/relevant employees) without opposing counsel's consent, but MAY contact a former employee.", "all": 1, "recent": 0}, {"section": "Duties to the Tribunal and Third Parties", "point": "Settlement restricting right to practice", "gist": "Lawyer may not agree, as a settlement or employment term, to restrict the lawyer's/firm's right to bring future suits against a party.", "all": 1, "recent": 1}, {"section": "Advertising, Solicitation and Professionalism", "point": "Attorney advertising", "gist": "Lawyer ads are protected commercial speech but must not be false/misleading, must be labeled as advertising, must not promise results or guarantee/claim certification unless true, and must identify the lawyer/firm.", "all": 2, "recent": 0}, {"section": "Advertising, Solicitation and Professionalism", "point": "Solicitation / 30-day rule", "gist": "Lawyer may not solicit employment in-person, by phone, or real-time electronic for pecuniary gain (nor through an agent); FL bars targeted written solicitation of accident victims for 30 days, with strict content/envelope and disregard-if-represented rules.", "all": 3, "recent": 1}, {"section": "Advertising, Solicitation and Professionalism", "point": "Professionalism / civility to opposing counsel", "gist": "Lawyer owes candor, fairness, and civility to opposing counsel/parties and may not use threats or abuse of process (e.g., threatening to 'drag out' or 'bury' the opponent to harass).", "all": 3, "recent": 3}, {"section": "Reporting and Judicial Relations", "point": "Duty to report misconduct", "gist": "A lawyer who knows another lawyer committed a violation raising a substantial question of honesty/fitness must report it to the Florida Bar.", "all": 1, "recent": 0}, {"section": "Reporting and Judicial Relations", "point": "Ex parte communication / judicial impropriety", "gist": "Lawyer may not communicate ex parte with a judge about a pending matter without opposing counsel or exploit a personal relationship; lawyers and judges must avoid the appearance of impropriety, and a judge who cannot be impartial must recuse.", "all": 1, "recent": 1}], "Evidence": [{"section": "Relevance", "point": "Relevance — probative value vs. unfair prejudice", "gist": "Relevant evidence is excluded when its probative value is substantially outweighed by the danger of unfair prejudice (Fla. Stat. 90.403).", "all": 1, "recent": 1}, {"section": "Hearsay", "point": "Hearsay — definition and party-opponent admission", "gist": "Hearsay = out-of-court statement offered for its truth, inadmissible unless an exception applies; a party-opponent's own statement is admissible (non-hearsay/exception); third party's responsive statement stays inadmissible absent an exception.", "all": 1, "recent": 1}, {"section": "Hearsay", "point": "Hearsay exception — co-conspirator statement", "gist": "A co-conspirator's statement is admissible against another only if made DURING and IN FURTHERANCE of the conspiracy; a post-arrest confession implicating others does not qualify.", "all": 1, "recent": 1}, {"section": "Writings & Documentary Evidence", "point": "Rule of completeness", "gist": "When one party introduces part of a statement, the adverse party may require contemporaneous introduction of any other part that in fairness ought to be considered with it.", "all": 1, "recent": 1}, {"section": "Writings & Documentary Evidence", "point": "Best evidence rule", "gist": "To prove the contents of a writing/recording the original is required; loss or destruction not in bad faith excuses production and permits secondary evidence (a copy).", "all": 1, "recent": 1}, {"section": "Witnesses & Presentation of Evidence", "point": "Witness sequestration (rule of exclusion)", "gist": "On request the court must exclude (sequester) witnesses so they cannot hear other testimony; a victim's constitutional right to be present qualifies this exclusion for victims.", "all": 1, "recent": 1}, {"section": "Witnesses & Presentation of Evidence", "point": "Florida abolition of the Dead Man's Statute", "gist": "Florida has abolished the Dead Man's Statute, so an interested party may testify to a decedent's statements/transactions.", "all": 1, "recent": 0}]}},SUBJECTS=P.subjects,DATA=P.data;
const EYE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="2.6"/></svg>';
const state={subject:SUBJECTS[0],mode:'both',minrec:0,sort:'flow',search:'',revealed:new Set(),collapsed:new Set()};
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const hideTP=()=>state.mode==='both'||state.mode==='point';
const hideRule=()=>state.mode==='both'||state.mode==='rule';
const key=(i,c)=>state.subject+'|'+i+'|'+c;
function rowsFor(){let r=DATA[state.subject].map((x,i)=>({...x,_i:i}));
  if(state.minrec>0)r=r.filter(x=>x.recent>=state.minrec);
  if(state.search){const q=state.search.toLowerCase();r=r.filter(x=>(x.point+' '+x.gist+' '+x.section).toLowerCase().includes(q));}return r;}
function tabs(){const el=document.getElementById('tabs');
  el.innerHTML=SUBJECTS.map(s=>`<button class="tab ${s===state.subject?'active':''}" data-s="${esc(s)}">${esc(s)}<span class="n">${DATA[s].length}</span></button>`).join('');
  const a=el.querySelector('.tab.active');
  if(a){const ar=a.getBoundingClientRect(),er=el.getBoundingClientRect();el.scrollLeft+=(ar.left-er.left)-16;}}
function panel(r,col){const isPt=col==='pt';const hideThis=isPt?hideTP():hideRule();const k=key(r._i,col);
  const shown=!hideThis||state.revealed.has(k);const txt=isPt?esc(r.point):esc(r.gist);
  return `<div class="panel ${isPt?'pt':'rl'} ${hideThis&&!shown?'hidden':''}" data-key="${k}" data-can="${hideThis?1:0}">`+
    `<div class="plabel">${isPt?'Test point':'Rule — key words'}</div>`+
    `<div class="inner">${txt}</div>`+
    `<div class="cover">${EYE} reveal ${isPt?'point':'rule'}</div></div>`;}
function card(r,n){const hot=r.recent>=4?'hot':(r.recent===0?'zero':'');const hi=r.all>=8?'hi':'';
  return `<div class="card ${hi}"><div class="num">${n}</div>${panel(r,'pt')}${panel(r,'rl')}`+
    `<div class="freq"><span class="pill all">all ${r.all}</span><span class="pill rec ${hot}">rec ${r.recent}</span></div></div>`;}
function render(){tabs();
  document.querySelectorAll('#mode button').forEach(b=>b.classList.toggle('on',b.dataset.m===state.mode));
  document.querySelectorAll('#minrec button').forEach(b=>b.classList.toggle('on',+b.dataset.r===state.minrec));
  document.querySelectorAll('#sort button').forEach(b=>b.classList.toggle('on',b.dataset.s===state.sort));
  const rows=rowsFor(),c=document.getElementById('content');
  if(!rows.length){c.innerHTML='<div class="empty">No 考点 match this filter.</div>';return;}
  let h='';
  if(state.sort==='freq'){[...rows].sort((a,b)=>b.recent-a.recent||b.all-a.all).forEach((r,i)=>h+=card(r,i+1));}
  else{const groups=[];let cur=null;rows.forEach(r=>{if(!cur||cur.name!==r.section){cur={name:r.section,items:[]};groups.push(cur);}cur.items.push(r);});
    groups.forEach(g=>{const col=state.collapsed.has(g.name);
      h+=`<div class="sec ${col?'collapsed':''}" data-sec="${esc(g.name)}"><span class="eye">Section</span><h2 class="serif">${esc(g.name||'—')}</h2><span class="cnt">${g.items.length}</span><span class="chev">&#9662;</span></div>`;
      if(!col)g.items.forEach((r,i)=>h+=card(r,i+1));});}
  c.innerHTML=h;}
document.getElementById('tabs').addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;state.subject=t.dataset.s;state.revealed.clear();state.collapsed.clear();render();window.scrollTo({top:0});});
document.getElementById('mode').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;state.mode=b.dataset.m;state.revealed.clear();render();});
document.getElementById('minrec').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;state.minrec=+b.dataset.r;render();});
document.getElementById('sort').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;state.sort=b.dataset.s;render();});
document.getElementById('revealAll').addEventListener('click',()=>{rowsFor().forEach(r=>{if(hideTP())state.revealed.add(key(r._i,'pt'));if(hideRule())state.revealed.add(key(r._i,'rl'));});render();});
document.getElementById('hideAll').addEventListener('click',()=>{state.revealed.clear();render();});
document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value;render();});
document.getElementById('content').addEventListener('click',e=>{
  const s=e.target.closest('.sec');if(s){const n=s.dataset.sec;state.collapsed.has(n)?state.collapsed.delete(n):state.collapsed.add(n);render();return;}
  const p=e.target.closest('.panel');if(!p||p.dataset.can!=='1')return;const k=p.dataset.key;
  if(state.revealed.has(k)){state.revealed.delete(k);p.classList.add('hidden');p.classList.remove('reveal');}
  else{state.revealed.add(k);p.classList.remove('hidden');p.classList.add('reveal');}});
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;
  if(e.key==='r'||e.key==='R')revealAll.click();else if(e.key==='h'||e.key==='H')hideAll.click();
  else if(e.key==='ArrowRight'||e.key==='ArrowLeft'){const i=SUBJECTS.indexOf(state.subject);state.subject=SUBJECTS[(i+(e.key==='ArrowRight'?1:SUBJECTS.length-1))%SUBJECTS.length];state.revealed.clear();state.collapsed.clear();render();window.scrollTo({top:0});}});
render();
</script>
